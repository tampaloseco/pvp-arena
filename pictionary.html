<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎨 Pictionary</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0d0d1a;
    font-family:'VT323',monospace;
    font-size:18px;
    color:#fff;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  #app { width:900px; max-width:100vw; }

  /* ── LOBBY ── */
  #lobby {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    background:#111122;
    border:3px solid #aa44ff;
    box-shadow:0 0 30px #aa44ff44;
    padding:30px 40px;
    border-radius:4px;
  }
  #lobby h1 { font-family:'Press Start 2P',monospace; font-size:14px; color:#aa44ff; text-shadow:0 0 20px #aa44ff; letter-spacing:2px; }
  #lobby input {
    background:#0a0a18;
    border:2px solid #aa44ff66;
    color:#fff;
    font-family:'VT323',monospace;
    font-size:20px;
    padding:8px 14px;
    width:280px;
    text-align:center;
    outline:none;
  }
  #lobby input:focus { border-color:#aa44ff; }
  #lobby-players { color:#aaaaff; font-size:16px; text-align:center; min-height:24px; }
  .btn {
    font-family:'Press Start 2P',monospace;
    font-size:8px;
    padding:10px 20px;
    border:2px solid;
    background:transparent;
    cursor:pointer;
    transition:all 0.15s;
  }
  .btn:hover { filter:brightness(1.3); }
  .btn-purple { color:#aa44ff; border-color:#aa44ff; }
  .btn-purple:hover { background:#aa44ff22; }
  .btn-green { color:#44ffaa; border-color:#44ffaa; }
  .btn-green:hover { background:#44ffaa22; }
  .btn-red { color:#ff4466; border-color:#ff4466; }
  .btn-red:hover { background:#ff446622; }

  /* ── GAME ── */
  #game { display:none; gap:10px; }
  #game.active { display:flex; }

  /* Canvas area */
  #canvas-wrap {
    position:relative;
    flex-shrink:0;
  }
  #canvas {
    display:block;
    border:3px solid #aa44ff;
    border-radius:4px;
    cursor:crosshair;
    background:#fff;
  }
  #canvas.guessing { cursor:default; }

  /* Toolbar */
  #toolbar {
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:6px;
    flex-wrap:wrap;
  }
  .color-btn {
    width:24px; height:24px;
    border:3px solid transparent;
    border-radius:50%;
    cursor:pointer;
    transition:transform 0.1s;
  }
  .color-btn.selected { border-color:#fff; transform:scale(1.2); }
  #size-slider { width:80px; accent-color:#aa44ff; }
  #clear-btn { font-size:14px; }
  #eraser-btn { font-size:14px; }

  /* Right panel */
  #panel {
    display:flex;
    flex-direction:column;
    gap:8px;
    width:240px;
    flex-shrink:0;
  }

  #round-info {
    background:#111122;
    border:2px solid #aa44ff66;
    padding:10px;
    border-radius:4px;
    text-align:center;
  }
  #round-info .round-label { font-family:'Press Start 2P',monospace; font-size:7px; color:#aa44ff; }
  #round-info .word-display { font-size:22px; color:#ffdd44; margin-top:4px; letter-spacing:3px; }
  #round-info .timer { font-family:'Press Start 2P',monospace; font-size:18px; color:#ff6644; margin-top:4px; }

  #scoreboard {
    background:#111122;
    border:2px solid #aa44ff66;
    padding:8px;
    border-radius:4px;
    flex:1;
    overflow-y:auto;
  }
  #scoreboard h3 { font-family:'Press Start 2P',monospace; font-size:7px; color:#aa44ff; margin-bottom:8px; }
  .score-row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:4px 0;
    border-bottom:1px solid #ffffff11;
    font-size:16px;
  }
  .score-row .name { color:#ddd; max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .score-row .pts { color:#ffdd44; font-family:'Press Start 2P',monospace; font-size:8px; }
  .score-row.drawing .name::before { content:'✏️ '; }
  .score-row.guessed .name { color:#44ffaa; }

  #chat-wrap {
    background:#111122;
    border:2px solid #aa44ff66;
    border-radius:4px;
    display:flex;
    flex-direction:column;
    height:180px;
  }
  #chat-log {
    flex:1;
    overflow-y:auto;
    padding:6px 8px;
    font-size:15px;
    line-height:1.6;
  }
  #chat-log p { color:#bbb; }
  #chat-log p.correct { color:#44ffaa; font-weight:bold; }
  #chat-log p.system { color:#aa44ff; font-size:13px; }
  #chat-log p.close { color:#ffdd44; }
  #chat-input-wrap { display:flex; border-top:1px solid #ffffff11; }
  #chat-input {
    flex:1;
    background:transparent;
    border:none;
    color:#fff;
    font-family:'VT323',monospace;
    font-size:17px;
    padding:6px 8px;
    outline:none;
  }
  #chat-send {
    background:#aa44ff22;
    border:none;
    border-left:1px solid #ffffff11;
    color:#aa44ff;
    font-family:'Press Start 2P',monospace;
    font-size:7px;
    padding:0 10px;
    cursor:pointer;
  }
  #chat-send:hover { background:#aa44ff44; }

  /* Status overlay on canvas */
  #canvas-status {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.82);
    color:#ffdd44;
    font-family:'Press Start 2P',monospace;
    font-size:11px;
    padding:18px 28px;
    border:2px solid #ffdd44;
    text-align:center;
    line-height:2;
    display:none;
    pointer-events:none;
    border-radius:4px;
  }

  /* Word choice */
  #word-choice {
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.88);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    border-radius:4px;
  }
  #word-choice h3 { font-family:'Press Start 2P',monospace; font-size:9px; color:#aa44ff; }
  .word-opt {
    font-family:'Press Start 2P',monospace;
    font-size:9px;
    padding:12px 24px;
    border:2px solid #ffffff44;
    color:#fff;
    background:transparent;
    cursor:pointer;
    width:80%;
    text-align:center;
    transition:all 0.15s;
  }
  .word-opt:hover { border-color:#aa44ff; background:#aa44ff22; color:#aa44ff; }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>🎨 PICTIONARY</h1>
  <div style="color:#aaaaff;font-size:15px;text-align:center">ESCRIBE TU NOMBRE Y CREA<br>O ÚNETE A UNA SALA</div>
  <input id="name-input" type="text" maxlength="16" placeholder="TU NOMBRE" />
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-purple" onclick="createRoom()">🆕 CREAR SALA</button>
    <div style="display:flex;gap:6px;align-items:center">
      <input id="join-code" type="text" maxlength="4" placeholder="CÓDIGO" style="width:100px;font-size:16px;padding:8px;" oninput="this.value=this.value.toUpperCase()"/>
      <button class="btn btn-green" onclick="joinRoom()">▶ UNIRSE</button>
    </div>
  </div>
  <div id="lobby-code" style="display:none;text-align:center">
    <div style="color:#aaaaff;font-size:14px;margin-bottom:4px">CÓDIGO DE SALA:</div>
    <div id="code-display" style="font-family:'Press Start 2P',monospace;font-size:20px;color:#aa44ff;text-shadow:0 0 15px #aa44ff;letter-spacing:4px;"></div>
    <div style="color:#ffffff55;font-size:13px;margin-top:6px">COMPARTE ESTE CÓDIGO</div>
  </div>
  <div id="lobby-players"></div>
  <button id="start-btn" class="btn btn-green" style="display:none" onclick="startGame()">▶ INICIAR PARTIDA</button>
  <div id="lobby-status" style="color:#ffffff55;font-size:14px;text-align:center"></div>
</div>

<!-- GAME -->
<div id="game">
  <div id="canvas-wrap">
    <canvas id="canvas" width="620" height="440"></canvas>
    <div id="canvas-status"></div>
    <div id="word-choice"></div>
    <div id="toolbar">
      <div id="colors"></div>
      <input type="range" id="size-slider" min="2" max="40" value="6">
      <button class="btn btn-red" id="eraser-btn" onclick="toggleEraser()">⬜ BORRADOR</button>
      <button class="btn btn-purple" id="clear-btn" onclick="clearCanvas()">🗑 LIMPIAR</button>
    </div>
  </div>
  <div id="panel">
    <div id="round-info">
      <div class="round-label">RONDA <span id="round-num">1</span> / <span id="round-total">3</span></div>
      <div class="word-display" id="word-display">? ? ? ? ?</div>
      <div class="timer" id="timer">60</div>
    </div>
    <div id="scoreboard">
      <h3>🏆 PUNTUACIÓN</h3>
      <div id="score-list"></div>
    </div>
    <div id="chat-wrap">
      <div id="chat-log"></div>
      <div id="chat-input-wrap">
        <input id="chat-input" type="text" placeholder="Escribe tu respuesta..." maxlength="40" />
        <button id="chat-send" onclick="sendGuess()">OK</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, push, remove, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxMJXKfGJAngeSi-JbrtieIgyZZN5Q6P8",
  authDomain: "billar-workadventure.firebaseapp.com",
  databaseURL: "https://billar-workadventure-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "billar-workadventure",
  storageBucket: "billar-workadventure.firebasestorage.app",
  messagingSenderId: "773546684229",
  appId: "1:773546684259:web:034a2dcd3702d8b5766d56"
};

const fbApp = initializeApp(firebaseConfig, 'pictionary');
const db = getDatabase(fbApp);

// ── WORDS ──
const WORDS = [
  'gato','perro','casa','árbol','sol','luna','coche','avión','barco','tren',
  'pizza','silla','mesa','libro','teléfono','ordenador','pelota','guitarra','piano','cámara',
  'montaña','playa','río','volcán','desierto','castillo','puente','faro','molino','iglesia',
  'dinosaurio','ballena','elefante','jirafa','pingüino','cocodrilo','murciélago','pulpo','cangrejo','flamenco',
  'astronauta','pirata','robot','ninja','fantasma','bruja','dragón','unicornio','zombie','sirena',
  'helado','sushi','hamburguesa','taco','paella','churros','croissant','donut','sandía','piña',
  'cohete','telescopio','mapa','brújula','linterna','paraguas','mochila','tienda de campaña','bicicleta','monopatín',
  'mariposa','caracol','hormiga','abeja','loro','tortuga','camello','canguro','panda','zorro'
];

// ── CANVAS ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#fff';
ctx.fillRect(0,0,canvas.width,canvas.height);

const COLORS = ['#111111','#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#ffffff','#78716c'];
let currentColor = '#111111';
let brushSize = 6;
let erasing = false;
let drawing = false;
let lastX = 0, lastY = 0;

// Build color palette
const colorsDiv = document.getElementById('colors');
COLORS.forEach(c => {
  const btn = document.createElement('div');
  btn.className = 'color-btn' + (c === currentColor ? ' selected' : '');
  btn.style.background = c;
  btn.style.border = c === '#ffffff' ? '3px solid #555' : '3px solid transparent';
  btn.onclick = () => {
    erasing = false;
    currentColor = c;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('eraser-btn').style.opacity = '1';
  };
  colorsDiv.appendChild(btn);
});

window.toggleEraser = () => {
  erasing = !erasing;
  document.getElementById('eraser-btn').style.opacity = erasing ? '0.5' : '1';
};

document.getElementById('size-slider').oninput = e => brushSize = +e.target.value;

// ── STATE ──
let myId = 'p_' + Math.random().toString(36).substr(2,8);
let myName = '';
let roomId = null;
let isHost = false;
let isDrawer = false;
let currentWord = '';
let wordMasked = '';
let timerInterval = null;
let timerVal = 60;
let roundNum = 1;
let totalRounds = 3;
let scores = {};
let players = {};
let guessedPlayers = new Set();
let strokeBuffer = [];
let strokeFlushTimer = null;
let gamePhase = 'lobby'; // lobby | choosing | drawing | reveal | gameover

// ── LOBBY ──
window.createRoom = () => {
  myName = document.getElementById('name-input').value.trim() || 'Jugador';
  roomId = Math.random().toString(36).substr(2,4).toUpperCase();
  isHost = true;
  set(ref(db, 'pic/' + roomId), {
    host: myId,
    phase: 'lobby',
    round: 1,
    totalRounds: 3,
    drawer: null,
    word: '',
    wordMasked: '',
    scores: {},
    strokes: null,
    chat: null,
    players: { [myId]: { name: myName, score: 0, online: true } }
  });
  document.getElementById('lobby-code').style.display = 'block';
  document.getElementById('code-display').textContent = roomId;
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('lobby-status').textContent = 'Esperando jugadores...';
  listenLobby();
};

window.joinRoom = () => {
  myName = document.getElementById('name-input').value.trim() || 'Jugador';
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code) return;
  roomId = code;
  isHost = false;
  get(ref(db,'pic/'+roomId)).then(snap => {
    if (!snap.exists()) { alert('Sala no encontrada'); return; }
    update(ref(db,'pic/'+roomId+'/players'), { [myId]: { name: myName, score: 0, online: true } });
    listenLobby();
  });
};

function listenLobby() {
  onValue(ref(db,'pic/'+roomId+'/players'), snap => {
    if (!snap.exists()) return;
    players = snap.val();
    const names = Object.values(players).map(p=>p.name).join(' · ');
    document.getElementById('lobby-players').textContent = `👥 ${Object.keys(players).length} jugadores: ${names}`;
  });
  onValue(ref(db,'pic/'+roomId+'/phase'), snap => {
    if (snap.val() === 'choosing' || snap.val() === 'drawing') enterGame();
  });
}

window.startGame = () => {
  if (!isHost) return;
  get(ref(db,'pic/'+roomId+'/players')).then(snap => {
    players = snap.val() || {};
    scores = {};
    Object.keys(players).forEach(id => scores[id] = 0);
    const playerIds = Object.keys(players);
    update(ref(db,'pic/'+roomId), {
      phase: 'choosing',
      round: 1,
      drawer: playerIds[0],
      scores,
      strokes: null,
      chat: null
    });
  });
};

// ── ENTER GAME ──
function enterGame() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').classList.add('active');
  listenGame();
}

function listenGame() {
  onValue(ref(db,'pic/'+roomId), snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    players = data.players || {};
    scores = data.scores || {};
    roundNum = data.round || 1;
    totalRounds = data.totalRounds || 3;
    const drawerId = data.drawer;
    isDrawer = drawerId === myId;
    gamePhase = data.phase;

    document.getElementById('round-num').textContent = roundNum;
    document.getElementById('round-total').textContent = totalRounds;

    updateScoreboard(drawerId);

    if (data.phase === 'choosing') {
      handleChoosing(data, drawerId);
    } else if (data.phase === 'drawing') {
      handleDrawing(data, drawerId);
    } else if (data.phase === 'reveal') {
      handleReveal(data);
    } else if (data.phase === 'gameover') {
      handleGameover(data);
    }
  });

  // Strokes
  onValue(ref(db,'pic/'+roomId+'/strokes'), snap => {
    if (!snap.exists() || isDrawer || gamePhase !== 'drawing') return;
    const strokes = snap.val();
    if (!strokes) { ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); return; }
    replayStrokes(Array.isArray(strokes) ? strokes : Object.values(strokes));
  });

  // Chat
  onValue(ref(db,'pic/'+roomId+'/chat'), snap => {
    if (!snap.exists()) return;
    const msgs = snap.val();
    if (!msgs) return;
    const arr = Array.isArray(msgs) ? msgs : Object.values(msgs);
    const log = document.getElementById('chat-log');
    log.innerHTML = '';
    arr.forEach(m => {
      const p = document.createElement('p');
      p.className = m.type || '';
      p.textContent = m.text;
      log.appendChild(p);
    });
    log.scrollTop = log.scrollHeight;
  });
}

function handleChoosing(data, drawerId) {
  stopTimer();
  clearCanvasLocal();
  guessedPlayers = new Set();
  document.getElementById('word-display').textContent = '? ? ?';

  if (isDrawer) {
    // Show word choice
    const opts = getRandomWords(3);
    const wc = document.getElementById('word-choice');
    wc.innerHTML = '<h3>ELIGE UNA PALABRA</h3>';
    opts.forEach(w => {
      const btn = document.createElement('button');
      btn.className = 'word-opt';
      btn.textContent = w.toUpperCase();
      btn.onclick = () => {
        const masked = maskWord(w);
        update(ref(db,'pic/'+roomId),{
          phase:'drawing', word:w, wordMasked:masked,
          strokes:null, chat:null, guessed:null
        });
        wc.style.display = 'none';
      };
      wc.appendChild(btn);
    });
    wc.style.display = 'flex';
    showStatus('');
    setCanvasMode(true);
  } else {
    const drawerName = players[drawerId]?.name || 'Alguien';
    showStatus(`✏️ ${drawerName}\nESTÁ ELIGIENDO\nPALABRA...`);
    setCanvasMode(false);
  }
}

function handleDrawing(data, drawerId) {
  document.getElementById('word-choice').style.display = 'none';
  currentWord = data.word || '';
  wordMasked = data.wordMasked || '';
  const drawerName = players[drawerId]?.name || '?';

  if (isDrawer) {
    document.getElementById('word-display').textContent = currentWord.toUpperCase();
    showStatus('');
    setCanvasMode(true);
    startTimer(60, () => endRound());
  } else {
    document.getElementById('word-display').textContent = wordMasked;
    showStatus('');
    setCanvasMode(false);
    startTimer(60, () => {});
  }

  // Re-check guessed
  if (data.guessed) {
    guessedPlayers = new Set(Object.keys(data.guessed));
  }
  updateScoreboard(drawerId);
}

function handleReveal(data) {
  stopTimer();
  showStatus(`⏱ TIEMPO!\nLA PALABRA ERA:\n${(data.word||'').toUpperCase()}`);
  setCanvasMode(false);
  document.getElementById('word-display').textContent = (data.word||'').toUpperCase();
  if (isHost) {
    setTimeout(() => nextRound(data), 3500);
  }
}

function handleGameover(data) {
  stopTimer();
  setCanvasMode(false);
  const sorted = Object.entries(data.scores||{})
    .sort((a,b)=>b[1]-a[1]);
  const winner = players[sorted[0]?.[0]]?.name || '?';
  showStatus(`🏆 FIN!\nGANA: ${winner.toUpperCase()}\n\nRECARGA PARA\nJUGAR DE NUEVO`);
}

// ── ROUND LOGIC ──
function endRound() {
  if (!isHost) return;
  update(ref(db,'pic/'+roomId),{ phase:'reveal' });
}

function nextRound(data) {
  if (!isHost) return;
  const playerIds = Object.keys(players);
  const curDrawerIdx = playerIds.indexOf(data.drawer);
  const nextDrawerIdx = (curDrawerIdx + 1) % playerIds.length;
  const nextDrawer = playerIds[nextDrawerIdx];
  const newRound = curDrawerIdx === playerIds.length - 1 ? (data.round||1) + 1 : (data.round||1);

  if (newRound > totalRounds) {
    update(ref(db,'pic/'+roomId),{ phase:'gameover' });
    return;
  }
  update(ref(db,'pic/'+roomId),{
    phase:'choosing', round:newRound, drawer:nextDrawer,
    word:'', wordMasked:'', strokes:null, guessed:null
  });
}

// ── GUESSING ──
window.sendGuess = () => {
  const input = document.getElementById('chat-input');
  const guess = input.value.trim();
  input.value = '';
  if (!guess || isDrawer || gamePhase !== 'drawing') return;
  if (guessedPlayers.has(myId)) { addChatMsg({ text: 'Ya adivinaste 🎉', type: 'system' }); return; }

  const isCorrect = guess.toLowerCase() === currentWord.toLowerCase();

  if (isCorrect) {
    guessedPlayers.add(myId);
    const pts = Math.max(10, timerVal * 2);
    const newScores = { ...scores, [myId]: (scores[myId]||0) + pts };
    const guessedUpdate = {};
    guessedUpdate['guessed/'+myId] = true;
    update(ref(db,'pic/'+roomId), { scores: newScores, ...guessedUpdate });
    addChatMsg({ text: `✅ ${myName} adivinó la palabra! (+${pts}pts)`, type: 'correct' });
    // Check all guessed
    const nonDrawers = Object.keys(players).filter(id => id !== document.getElementById('round-num').dataset.drawer);
    if ([...guessedPlayers].length >= nonDrawers.length) {
      if (isHost) update(ref(db,'pic/'+roomId),{phase:'reveal'});
    }
  } else {
    const close = isClose(guess, currentWord);
    addChatMsg({ text: `${myName}: ${guess}`, type: close ? 'close' : '' });
    if (close) addChatMsg({ text: '🔥 ¡Muy cerca!', type: 'close' });
  }
};

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.sendGuess();
});

function addChatMsg(msg) {
  push(ref(db,'pic/'+roomId+'/chat'), msg);
}

function isClose(guess, word) {
  if (!word) return false;
  const g = guess.toLowerCase(), w = word.toLowerCase();
  if (w.includes(g) || g.includes(w)) return true;
  let diff = 0;
  const len = Math.max(g.length, w.length);
  for (let i=0; i<len; i++) if (g[i]!==w[i]) diff++;
  return diff <= 2;
}

// ── DRAWING ──
canvas.addEventListener('mousedown', e => {
  if (!isDrawer || gamePhase !== 'drawing') return;
  drawing = true;
  [lastX, lastY] = getPos(e);
});
canvas.addEventListener('mousemove', e => {
  if (!drawing || !isDrawer) return;
  const [x, y] = getPos(e);
  drawLine(lastX, lastY, x, y, erasing ? '#ffffff' : currentColor, brushSize, true);
  [lastX, lastY] = [x, y];
});
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  return [e.clientX - r.left, e.clientY - r.top];
}

function drawLine(x1, y1, x2, y2, color, size, send) {
  ctx.strokeStyle = color;
  ctx.lineWidth = size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  if (send) {
    strokeBuffer.push({ x1:Math.round(x1), y1:Math.round(y1), x2:Math.round(x2), y2:Math.round(y2), c:color, s:size });
    if (!strokeFlushTimer) {
      strokeFlushTimer = setTimeout(() => {
        update(ref(db,'pic/'+roomId), { strokes: strokeBuffer.slice() });
        strokeFlushTimer = null;
      }, 60);
    }
  }
}

function replayStrokes(strokes) {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  strokes.forEach(s => drawLine(s.x1, s.y1, s.x2, s.y2, s.c, s.s, false));
}

window.clearCanvas = () => {
  if (!isDrawer) return;
  clearCanvasLocal();
  update(ref(db,'pic/'+roomId), { strokes: null });
  strokeBuffer = [];
};

function clearCanvasLocal() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  strokeBuffer = [];
}

// ── TIMER ──
function startTimer(secs, onEnd) {
  stopTimer();
  timerVal = secs;
  document.getElementById('timer').textContent = secs;
  timerInterval = setInterval(() => {
    timerVal--;
    document.getElementById('timer').textContent = timerVal;
    document.getElementById('timer').style.color = timerVal <= 10 ? '#ff2244' : '#ff6644';
    if (timerVal <= 0) { stopTimer(); onEnd(); }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

// ── UI HELPERS ──
function setCanvasMode(canDraw) {
  canvas.style.cursor = canDraw ? 'crosshair' : 'default';
  document.getElementById('toolbar').style.opacity = canDraw ? '1' : '0.3';
  document.getElementById('toolbar').style.pointerEvents = canDraw ? 'all' : 'none';
  document.getElementById('chat-input').disabled = canDraw;
  document.getElementById('chat-send').disabled = canDraw;
  document.getElementById('chat-input').placeholder = canDraw ? '(Estás dibujando)' : 'Escribe tu respuesta...';
}

function showStatus(txt) {
  const el = document.getElementById('canvas-status');
  if (txt) {
    el.innerHTML = txt.replace(/\n/g,'<br>');
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function updateScoreboard(drawerId) {
  document.getElementById('round-num').dataset.drawer = drawerId;
  const list = document.getElementById('score-list');
  list.innerHTML = '';
  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  sorted.forEach(([id, pts]) => {
    const row = document.createElement('div');
    row.className = 'score-row' +
      (id === drawerId ? ' drawing' : '') +
      (guessedPlayers.has(id) ? ' guessed' : '');
    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = (players[id]?.name || '?') + (id === myId ? ' (tú)' : '');
    const p = document.createElement('span');
    p.className = 'pts';
    p.textContent = pts + 'pts';
    row.appendChild(name);
    row.appendChild(p);
    list.appendChild(row);
  });
}

function maskWord(word) {
  return word.split('').map(c => c === ' ' ? ' ' : '_').join(' ');
}

function getRandomWords(n) {
  const shuffled = [...WORDS].sort(()=>Math.random()-0.5);
  return shuffled.slice(0,n);
}
