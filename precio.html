<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>💰 El Precio Justo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0f0a; font-family:'VT323',monospace; color:#fff; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px; }
  h1 { font-family:'Press Start 2P',monospace; font-size:10px; color:#ffdd00; text-shadow:0 0 15px #ffdd00; margin-bottom:10px; letter-spacing:2px; text-align:center; }
  .btn { font-family:'Press Start 2P',monospace; font-size:8px; padding:10px 16px; border:2px solid; background:transparent; cursor:pointer; transition:all 0.15s; }
  .btn:hover { filter:brightness(1.4); }
  .btn-yellow { color:#ffdd00; border-color:#ffdd00; }
  .btn-yellow:hover { background:#ffdd0022; }
  .btn-green { color:#44ff88; border-color:#44ff88; }
  .btn-green:hover { background:#44ff8822; }
  .btn-gray { color:#aaa; border-color:#aaa; }
  .btn-gray:hover { background:#aaaaaa22; }
  input[type=text], input[type=number] { background:#050f05; border:2px solid #ffffff22; color:#fff; font-family:'VT323',monospace; font-size:18px; padding:8px 12px; outline:none; text-align:center; }
  input:focus { border-color:#ffdd00; }
  .code-display { font-family:'Press Start 2P',monospace; font-size:22px; color:#ffdd00; text-shadow:0 0 15px #ffdd00; letter-spacing:6px; text-align:center; }
  .lbl { font-size:14px; color:#ffffff44; text-align:center; }
  #lobby { position:fixed; inset:0; background:#0a0f0a; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:10; }
  #app { width:560px; }
  .box { background:#0f1a0f; border:2px solid #ffdd0033; padding:12px; border-radius:4px; margin-bottom:10px; }
  .box h3 { font-family:'Press Start 2P',monospace; font-size:7px; color:#ffdd00; margin-bottom:8px; }

  /* Product display */
  #product-display { text-align:center; padding:20px; border:3px solid #ffdd00; border-radius:4px; margin-bottom:12px; box-shadow:0 0 20px #ffdd0022; }
  #product-emoji { font-size:60px; }
  #product-name { font-family:'Press Start 2P',monospace; font-size:10px; color:#ffdd00; margin:10px 0 4px; }
  #product-desc { font-size:16px; color:#aaa; }

  /* Bids */
  .bid-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid #ffffff0a; font-size:16px; }
  .bid-name { color:#ddd; }
  .bid-amount { color:#ffdd00; font-family:'Press Start 2P',monospace; font-size:8px; }
  .bid-row.winner { background:#ffdd0011; border-radius:3px; padding:5px 6px; }
  .bid-row.winner .bid-name { color:#ffdd00; }

  /* Price reveal */
  #reveal-price { font-family:'Press Start 2P',monospace; font-size:24px; color:#44ff88; text-shadow:0 0 15px #44ff88; text-align:center; margin:10px 0; }

  #chat-log { height:80px; overflow-y:auto; font-size:14px; line-height:1.6; }
  #chat-log p { color:#888; }
  #chat-log p.system { color:#ffdd00; font-size:12px; }
  #chat-log p.win { color:#44ff88; }
  #chat-input-row { display:flex; gap:6px; margin-top:6px; }
  #chat-input { flex:1; font-size:15px; text-align:left; }
  #chat-send { font-family:'Press Start 2P',monospace; font-size:6px; padding:6px 10px; border:2px solid #ffdd00; color:#ffdd00; background:transparent; cursor:pointer; }

  #status-msg { font-family:'Press Start 2P',monospace; font-size:8px; text-align:center; min-height:20px; color:#ff4466; }
  #score-list .score-row { display:flex; justify-content:space-between; font-size:15px; padding:3px 0; border-bottom:1px solid #ffffff08; }
  #score-list .score-row .pts { font-family:'Press Start 2P',monospace; font-size:7px; color:#ffdd00; }
</style>
</head>
<body>
<div id="lobby">
  <h1>💰 EL PRECIO<br>JUSTO</h1>
  <div class="lbl">¿QUIÉN ADIVINA EL PRECIO<br>MÁS CERCANO SIN PASARSE?</div>
  <input id="name-input" type="text" placeholder="TU NOMBRE" maxlength="16" style="width:240px;" />
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-yellow" onclick="createRoom()">🆕 CREAR</button>
    <div style="display:flex;gap:6px;align-items:center;">
      <input id="join-code" type="text" maxlength="4" placeholder="CÓDIGO" style="width:90px;font-size:15px;" oninput="this.value=this.value.toUpperCase()"/>
      <button class="btn btn-gray" onclick="joinRoom()">▶ UNIRSE</button>
    </div>
  </div>
  <div id="lobby-code-wrap" style="display:none;text-align:center">
    <div class="lbl">CÓDIGO:</div>
    <div class="code-display" id="lobby-code"></div>
  </div>
  <div id="lobby-info" class="lbl"></div>
  <button id="lobby-start" class="btn btn-green" style="display:none;" onclick="startGame()">▶ EMPEZAR</button>
</div>

<div id="app">
  <h1>💰 EL PRECIO JUSTO</h1>
  <div id="product-display">
    <div id="product-emoji">🎁</div>
    <div id="product-name">CARGANDO...</div>
    <div id="product-desc"></div>
  </div>
  <div id="status-msg"></div>
  <div class="box" id="bid-box">
    <h3>💸 PUJAS</h3>
    <div id="bids-list"></div>
    <div style="display:flex;gap:8px;margin-top:10px;align-items:center;">
      <input type="number" id="bid-input" placeholder="Tu precio €" style="flex:1;width:auto;" min="0" max="999999"/>
      <button class="btn btn-yellow" id="bid-btn" onclick="placeBid()">PUJAR</button>
    </div>
  </div>
  <div class="box" id="scores-box">
    <h3>🏆 PUNTUACIÓN</h3>
    <div id="score-list"></div>
    <button class="btn btn-yellow" id="next-btn" style="display:none;width:100%;margin-top:8px;" onclick="nextProduct()">▶ SIGUIENTE PRODUCTO</button>
  </div>
  <div class="box">
    <h3>💬 CHAT</h3>
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Debate el precio..." maxlength="60" />
      <button id="chat-send" onclick="sendChat()">→</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxMJXKfGJAngeSi-JbrtieIgyZZN5Q6P8",
  authDomain: "billar-workadventure.firebaseapp.com",
  databaseURL: "https://billar-workadventure-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "billar-workadventure",
  storageBucket: "billar-workadventure.firebasestorage.app",
  messagingSenderId: "773546684259",
  appId: "1:773546684259:web:034a2dcd3702d8b5766d56"
};

const PRODUCTS = [
  {emoji:'🎮',name:'PlayStation 5',desc:'Consola Sony última generación',price:549},
  {emoji:'📱',name:'iPhone 15 Pro',desc:'Smartphone Apple 256GB',price:1229},
  {emoji:'☕',name:'Cafetera Nespresso',desc:'Cafetera de cápsulas Vertuo',price:149},
  {emoji:'🎧',name:'AirPods Pro',desc:'Auriculares Apple con cancelación de ruido',price:279},
  {emoji:'🖥️',name:'Monitor 4K 27"',desc:'Monitor LG UltraFine 4K',price:699},
  {emoji:'🏋️',name:'Kettlebell 16kg',desc:'Pesa rusa de hierro fundido',price:45},
  {emoji:'🛋️',name:'Sofá 3 plazas',desc:'Sofá de tela IKEA KIVIK',price:799},
  {emoji:'🚲',name:'Bicicleta eléctrica',desc:'E-bike urbana con batería 500Wh',price:1499},
  {emoji:'🍳',name:'Sartén Le Creuset',desc:'Sartén de hierro fundido 28cm',price:189},
  {emoji:'🎸',name:'Guitarra Fender',desc:'Fender Stratocaster Player Series',price:799},
  {emoji:'🏄',name:'Tabla de surf 7"',desc:'Tabla de surf para principiantes',price:350},
  {emoji:'🍷',name:'Vino Vega Sicilia',desc:'Unico 2015 - botella 75cl',price:320},
  {emoji:'⌚',name:'Apple Watch Series 9',desc:'Smartwatch 45mm GPS',price:499},
  {emoji:'🎿',name:'Esquís Rossignol',desc:'Pack esquís + botas carving',price:650},
  {emoji:'📷',name:'Sony Alpha A7 III',desc:'Cámara mirrorless full frame',price:2199},
  {emoji:'🛁',name:'Jacuzzi hinchable',desc:'Spa portátil para 4 personas',price:399},
  {emoji:'🍕',name:'Horno de pizza',desc:'Horno Ooni Koda 12 de gas',price:399},
  {emoji:'🪑',name:'Silla gaming',desc:'Secretlab TITAN Evo 2022',price:449},
  {emoji:'🔭',name:'Telescopio Celestron',desc:'NexStar 8SE motorizado',price:1899},
  {emoji:'🏡',name:'Robot aspirador',desc:'Roomba j9+ con autovaciado',price:899},
];

const fbApp = initializeApp(firebaseConfig, 'precio');
const db = getDatabase(fbApp);

let myId = 'p_' + Math.random().toString(36).substr(2,8);
let myName = '';
let roomId = null;
let isHost = false;
let players = {};
let hasBid = false;
let currentProductIdx = 0;
let revealed = false;

window.createRoom = () => {
  myName = document.getElementById('name-input').value.trim() || 'Jugador';
  roomId = Math.random().toString(36).substr(2,4).toUpperCase();
  isHost = true;
  set(ref(db,`prec/${roomId}`), {
    host:myId, productIdx:0, bids:null, revealed:false, chat:null,
    players:{ [myId]:{ name:myName, score:0 } }
  });
  document.getElementById('lobby-code-wrap').style.display='block';
  document.getElementById('lobby-code').textContent=roomId;
  document.getElementById('lobby-start').style.display='block';
  listenLobby();
};

window.joinRoom = () => {
  myName = document.getElementById('name-input').value.trim() || 'Jugador';
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code) return;
  roomId = code;
  get(ref(db,`prec/${roomId}`)).then(snap => {
    if (!snap.exists()) { alert('Sala no encontrada'); return; }
    update(ref(db,`prec/${roomId}/players`), { [myId]:{ name:myName, score:0 } });
    document.getElementById('lobby-info').textContent='✅ Unido!';
    listenLobby();
  });
};

function listenLobby() {
  onValue(ref(db,`prec/${roomId}/players`), snap => {
    if (!snap.exists()) return;
    const ps = snap.val();
    document.getElementById('lobby-info').textContent=`👥 ${Object.keys(ps).length}: ${Object.values(ps).map(p=>p.name).join(', ')}`;
  });
  onValue(ref(db,`prec/${roomId}/started`), snap => { if (snap.val()) enterGame(); });
}

window.startGame = () => update(ref(db,`prec/${roomId}`),{started:true});

function enterGame() {
  document.getElementById('lobby').style.display='none';
  listenGame();
}

function listenGame() {
  onValue(ref(db,`prec/${roomId}`), snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    players = data.players || {};
    currentProductIdx = data.productIdx || 0;
    revealed = data.revealed || false;
    const product = PRODUCTS[currentProductIdx % PRODUCTS.length];
    document.getElementById('product-emoji').textContent = product.emoji;
    document.getElementById('product-name').textContent = product.name;
    document.getElementById('product-desc').textContent = product.desc;
    const bids = data.bids ? (Array.isArray(data.bids)?data.bids:Object.entries(data.bids).map(([id,v])=>({...v,id}))) : [];
    renderBids(bids, product.price, revealed);
    renderScores();
    if (revealed) {
      document.getElementById('next-btn').style.display = isHost ? 'block' : 'none';
    } else {
      document.getElementById('next-btn').style.display = 'none';
    }
  });
  onValue(ref(db,`prec/${roomId}/chat`), snap => {
    if (!snap.exists()) return;
    const msgs = snap.val();
    const arr = Array.isArray(msgs)?msgs:Object.values(msgs);
    const log = document.getElementById('chat-log');
    log.innerHTML = '';
    arr.slice(-20).forEach(m => { const p=document.createElement('p'); p.className=m.type||''; p.textContent=m.text; log.appendChild(p); });
    log.scrollTop = log.scrollHeight;
  });
}

function renderBids(bids, realPrice, show) {
  const list = document.getElementById('bids-list');
  list.innerHTML = '';
  if (!show) {
    bids.forEach(b => {
      const row = document.createElement('div');
      row.className = 'bid-row';
      row.innerHTML = `<span class="bid-name">${players[b.id]?.name||b.name||'?'}</span><span class="bid-amount">${b.id===myId?b.amount+'€':'✅ PUJADO'}</span>`;
      list.appendChild(row);
    });
    // Reveal button for host
    if (isHost && bids.length >= Object.keys(players).length) {
      const btn = document.createElement('button');
      btn.className = 'btn btn-yellow'; btn.style.width='100%'; btn.style.marginTop='8px';
      btn.textContent = '👁️ REVELAR PRECIO';
      btn.onclick = revealPrice;
      list.appendChild(btn);
    }
    return;
  }
  // Show revealed bids
  const sorted = [...bids].filter(b=>b.amount<=realPrice).sort((a,b)=>b.amount-a.amount);
  const winner = sorted[0];
  bids.sort((a,b)=>Math.abs(a.amount-realPrice)-Math.abs(b.amount-realPrice)).forEach(b => {
    const row = document.createElement('div');
    row.className = 'bid-row' + (winner && b.id===winner.id?' winner':'');
    const diff = b.amount - realPrice;
    const diffTxt = diff > 0 ? `+${diff}€ ❌` : diff === 0 ? `¡EXACTO! 🎯` : `${diff}€`;
    row.innerHTML = `<span class="bid-name">${players[b.id]?.name||b.name||'?'}</span><span class="bid-amount">${b.amount}€ <span style="color:${diff>0?'#ff4466':diff===0?'#44ff88':'#aaa'}">${diffTxt}</span></span>`;
    list.appendChild(row);
  });
  document.getElementById('reveal-price')?.remove();
  const rp = document.createElement('div');
  rp.id = 'reveal-price';
  rp.innerHTML = `💰 PRECIO REAL: <span style="color:#ffdd00">${realPrice}€</span>${winner?`<br><span style="color:#44ff88;font-size:14px;">🏆 GANA: ${players[winner.id]?.name||'?'}</span>`:'<br><span style="color:#ff4466;font-size:14px;">¡Nadie se acercó sin pasarse!</span>'}`;
  list.parentNode.insertBefore(rp, list);
}

function revealPrice() {
  const product = PRODUCTS[currentProductIdx % PRODUCTS.length];
  get(ref(db,`prec/${roomId}/bids`)).then(snap => {
    const bidsRaw = snap.val() || {};
    const bids = Object.entries(bidsRaw).map(([id,v])=>({...v,id}));
    const validBids = bids.filter(b=>b.amount<=product.price);
    const winner = validBids.sort((a,b)=>b.amount-a.amount)[0];
    if (winner) {
      const pts = 3;
      const updatedPlayers = {...players};
      updatedPlayers[winner.id] = {...updatedPlayers[winner.id], score:(updatedPlayers[winner.id]?.score||0)+pts};
      update(ref(db,`prec/${roomId}`),{revealed:true, players:updatedPlayers});
      push(ref(db,`prec/${roomId}/chat`),{text:`🏆 ${players[winner.id]?.name||'?'} gana con ${winner.amount}€! (Precio: ${product.price}€)`,type:'win'});
    } else {
      update(ref(db,`prec/${roomId}`),{revealed:true});
      push(ref(db,`prec/${roomId}/chat`),{text:`😬 Nadie ganó. El precio era ${product.price}€`,type:'system'});
    }
  });
}

window.nextProduct = () => {
  update(ref(db,`prec/${roomId}`),{ productIdx:(currentProductIdx+1), bids:null, revealed:false });
  hasBid = false;
  document.getElementById('bid-btn').disabled = false;
};

window.placeBid = () => {
  if (hasBid) return;
  const amount = parseInt(document.getElementById('bid-input').value);
  if (isNaN(amount) || amount < 0) { document.getElementById('status-msg').textContent='Introduce un precio válido'; return; }
  hasBid = true;
  document.getElementById('bid-btn').disabled = true;
  update(ref(db,`prec/${roomId}/bids`), { [myId]: { amount, name: myName, id: myId } });
  push(ref(db,`prec/${roomId}/chat`),{text:`${myName} ha pujado.`,type:''});
};

function renderScores() {
  const list = document.getElementById('score-list');
  list.innerHTML = '';
  Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0)).forEach(([id,p]) => {
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `<span style="color:${id===myId?'#ffdd00':'#ddd'}">${p.name}${id===myId?' (tú)':''}</span><span class="pts">${p.score||0}pts</span>`;
    list.appendChild(row);
  });
}

window.sendChat = () => {
  const input = document.getElementById('chat-input');
  const txt = input.value.trim(); input.value = '';
  if (!txt) return;
  push(ref(db,`prec/${roomId}/chat`),{text:`${myName}: ${txt}`});
};
document.getElementById('chat-input').addEventListener('keydown', e => { if(e.key==='Enter') window.sendChat(); });
document.getElementById('bid-input').addEventListener('keydown', e => { if(e.key==='Enter') window.placeBid(); });
</script>
</body>
</html>
