<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🥊 PvP Arena</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    height:100vh; overflow:hidden; font-family:'Press Start 2P',monospace;
  }
  #hud { display:flex; justify-content:space-between; align-items:center; width:700px; margin-bottom:6px; gap:10px; }
  .hp-wrap { flex:1; }
  .hp-name { font-size:8px; margin-bottom:3px; }
  .hp-bar-bg { background:#333; height:14px; border:1px solid #555; overflow:hidden; }
  .hp-bar { height:100%; transition:width 0.15s; }
  #hp1-name { color:#44aaff; }
  #hp2-name { color:#ff4444; text-align:right; }
  #hud-mid { text-align:center; min-width:70px; }
  #hud-vs { font-size:14px; color:#ffdd44; }
  #timer { font-size:12px; color:#fff; margin-top:2px; }
  #wins-display { font-size:8px; color:#ffffff66; margin-top:2px; }
  canvas { display:block; border:2px solid #333; }
  #hints { margin-top:5px; color:#ffffff22; font-size:6px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  #hints span { color:#ffffff44; }

  #overlay {
    position:absolute; background:rgba(0,0,0,0.93); border:2px solid #ffffff22;
    border-radius:6px; padding:24px 32px; display:flex; flex-direction:column;
    align-items:center; gap:12px; min-width:320px;
  }
  .otitle { font-size:14px; text-shadow:0 0 20px currentColor; text-align:center; line-height:2; }
  .obtn { font-family:'Press Start 2P',monospace; font-size:8px; padding:10px 16px; border:2px solid; background:transparent; cursor:pointer; transition:all 0.15s; width:100%; }
  .obtn:hover { filter:brightness(1.5); }
  .by { color:#ffdd44; border-color:#ffdd44; } .by:hover { background:#ffdd4420; }
  .bb { color:#44aaff; border-color:#44aaff; } .bb:hover { background:#44aaff20; }
  .bg { color:#44ffaa; border-color:#44ffaa; } .bg:hover { background:#44ffaa20; }
  .bgr { color:#aaa; border-color:#aaa; } .bgr:hover { background:#aaaaaa20; }
  .ninp { background:#050505; border:2px solid #ffffff22; color:#fff; font-family:'Press Start 2P',monospace; font-size:9px; padding:8px 10px; width:100%; text-align:center; outline:none; }
  .ninp:focus { border-color:#ffdd44; }
  .codebig { font-size:20px; color:#44aaff; text-shadow:0 0 12px #44aaff; letter-spacing:4px; text-align:center; }
  .row { display:flex; gap:8px; width:100%; align-items:center; }

  #announce {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    font-size:22px; color:#ffdd44; text-shadow:0 0 30px #ffdd44;
    text-align:center; pointer-events:none; opacity:0;
    transition:opacity 0.2s; white-space:nowrap;
  }
  #announce.show { opacity:1; }
</style>
</head>
<body>

<div id="hud">
  <div class="hp-wrap">
    <div class="hp-name" id="hp1-name">J1</div>
    <div class="hp-bar-bg"><div class="hp-bar" id="hp1-bar" style="width:100%"></div></div>
  </div>
  <div id="hud-mid">
    <div id="hud-vs">VS</div>
    <div id="timer">60</div>
    <div id="wins-display">●○ ○●</div>
  </div>
  <div class="hp-wrap">
    <div class="hp-name" id="hp2-name" style="text-align:right">J2</div>
    <div class="hp-bar-bg"><div class="hp-bar" id="hp2-bar" style="width:100%;margin-left:auto"></div></div>
  </div>
</div>

<div style="position:relative;">
  <canvas id="c" width="700" height="400"></canvas>
  <div id="announce"></div>
  <div id="overlay">
    <div id="s-menu">
      <div class="otitle" style="color:#ffdd44">🥊 PvP<br>ARENA</div>
      <input class="ninp" id="ninp" type="text" placeholder="TU NOMBRE" maxlength="12" style="margin-bottom:8px;"/>
      <button class="obtn by" id="btn-cpu">🤖 VS MÁQUINA</button>
      <button class="obtn bb" id="btn-create" style="margin-top:4px;">🆕 CREAR PARTIDA ONLINE</button>
      <div class="row" style="margin-top:4px;">
        <input class="ninp" id="cinp" type="text" maxlength="4" placeholder="CÓDIGO" style="width:110px;" oninput="this.value=this.value.toUpperCase()"/>
        <button class="obtn bg" style="margin:0;" id="btn-join">▶ UNIRSE</button>
      </div>
    </div>
    <div id="s-wait" style="display:none;text-align:center;">
      <div class="otitle" style="color:#44aaff">⏳ ESPERANDO...</div>
      <div style="color:#ffffff44;font-size:7px;margin-bottom:6px;">CÓDIGO DE SALA:</div>
      <div class="codebig" id="wcode"></div>
      <div style="color:#ffffff44;font-size:7px;margin-top:8px;">Comparte el código con tu rival</div>
    </div>
    <div id="s-over" style="display:none;text-align:center;">
      <div class="otitle" id="over-txt" style="color:#ffdd44"></div>
      <button class="obtn by" id="btn-restart" style="margin-top:10px;">▶ REVANCHA</button>
      <button class="obtn bgr" id="btn-menu" style="margin-top:6px;">🏠 MENÚ</button>
    </div>
  </div>
</div>

<div id="hints">
  <div><span>A/←</span>IZQ <span>D/→</span>DER <span>W/↑</span>SALTAR <span>S/↓</span>BLOQUEAR</div>
  <div><span>J</span>GOLPE <span>K</span>PATADA <span>L</span>ESPECIAL</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update as dbUp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const FB={apiKey:"AIzaSyDxMJXKfGJAngeSi-JbrtieIgyZZN5Q6P8",authDomain:"billar-workadventure.firebaseapp.com",databaseURL:"https://billar-workadventure-default-rtdb.europe-west1.firebasedatabase.app",projectId:"billar-workadventure",storageBucket:"billar-workadventure.firebasestorage.app",messagingSenderId:"773546684259",appId:"1:773546684259:web:034a2dcd3702d8b5766d56"};
const db=getDatabase(initializeApp(FB,'pvp3'));

const CV=document.getElementById('c'), cx=CV.getContext('2d');
const W=700, H=400, GND=H-70;
const GRAV=0.55, JF=-13, SPD=3.2, MAX_HP=100;

let mode=null, myP=1, rid=null, myName='J1', oppName='J2';
let raf=null, keys={}, syncT=0;
let f1=null, f2=null, hp=[MAX_HP,MAX_HP];
let round=1, wins=[0,0];
let timerVal=60, timerInt=null;
let effects=[], floats=[];
let gameActive=false;
let frameCount=0;

const CROWD=Array.from({length:22},(_,i)=>({x:20+i*(W-40)/21,col:`hsl(${Math.random()*360},35%,${22+Math.random()*12}%)`,h:28+Math.random()*18,ph:Math.random()*Math.PI*2}));
const TORCHES=[{x:60},{x:W-60}];

function mkF(x,facing,name){
  return{x,y:GND-60,vy:0,vx:0,facing,state:'idle',stTimer:0,name,blocking:false,combo:0,lastHit:0,af:0,at:0};
}

function initRound(){
  f1=mkF(140,1,myName);
  f2=mkF(W-180,-1,oppName);
  hp=[MAX_HP,MAX_HP];
  timerVal=60; effects=[]; floats=[];
  gameActive=true; frameCount=0;
  updHUD(); updWins();
  startTimer();
  showAnnounce('ROUND '+round, 1800);
}

// Buttons
document.getElementById('btn-cpu').onclick=function(){
  myName=document.getElementById('ninp').value.trim()||'Jugador';
  oppName='CPU'; mode='cpu'; hideOv(); initRound(); go();
};
document.getElementById('btn-create').onclick=function(){
  myName=document.getElementById('ninp').value.trim()||'Jugador';
  rid=Math.random().toString(36).substr(2,4).toUpperCase(); myP=1;
  sw('s-wait'); document.getElementById('wcode').textContent=rid;
  set(ref(db,'pvp3/'+rid),{state:'wait',p1n:myName,p2n:'',hp:[100,100],round:1,wins:[0,0]});
  onValue(ref(db,'pvp3/'+rid+'/state'),snap=>{
    if(snap.val()==='play'&&mode!=='online'){mode='online';hideOv();initRound();listenFB();go();}
  });
};
document.getElementById('btn-join').onclick=function(){
  myName=document.getElementById('ninp').value.trim()||'Jugador';
  const code=document.getElementById('cinp').value.trim().toUpperCase();
  if(!code)return; rid=code; myP=2;
  get(ref(db,'pvp3/'+rid)).then(snap=>{
    if(!snap.exists()){alert('Sala no encontrada');return;}
    oppName=snap.val().p1n||'Rival';
    dbUp(ref(db,'pvp3/'+rid),{p2n:myName,state:'play'});
    mode='online'; hideOv(); initRound();
    f1.name=oppName; f2.name=myName;
    listenFB(); go();
  });
};
document.getElementById('btn-restart').onclick=function(){hideOv();round=1;wins=[0,0];initRound();go();};
document.getElementById('btn-menu').onclick=function(){cancelAnimationFrame(raf);raf=null;stopTimer();sw('s-menu');showOv();};

// Firebase
function listenFB(){
  onValue(ref(db,'pvp3/'+rid),snap=>{
    if(!snap.exists()||!f1)return;
    const d=snap.val();
    const opp=myP===1?f2:f1;
    const ok=myP===1?'f2':'f1';
    if(d[ok]){const o=d[ok];opp.x=o.x;opp.y=o.y;opp.facing=o.f;opp.state=o.s;opp.stTimer=o.st||0;opp.blocking=o.bl||false;}
    if(d.hp){hp=d.hp;updHUD();}
    if(d.hit&&d.hit.by!==myP){applyHit(d.hit.t===1?f1:f2,d.hit.d,d.hit.tp);dbUp(ref(db,'pvp3/'+rid),{hit:null});}
  });
}
function syncMe(){
  if(mode!=='online')return;
  const me=myP===1?f1:f2; const k=myP===1?'f1':'f2';
  dbUp(ref(db,'pvp3/'+rid),{[k]:{x:+me.x.toFixed(1),y:+me.y.toFixed(1),f:me.facing,s:me.state,st:me.stTimer,bl:me.blocking}});
}

// Loop
function go(){cancelAnimationFrame(raf);raf=requestAnimationFrame(tick);}
function tick(){frameCount++;if(gameActive)step();draw();raf=requestAnimationFrame(tick);}

// Step
function step(){
  if(!f1||!f2)return;
  const me=myP===1||mode==='cpu'?f1:f2;
  const opp=myP===1||mode==='cpu'?f2:f1;

  // Controls
  if(me.state!=='ko'){
    const L=keys['a']||keys['ArrowLeft'], R=keys['d']||keys['ArrowRight'];
    if(L&&me.stTimer<5){me.vx=Math.max(-SPD,me.vx-0.6);if(me.state==='idle')me.state='walk';}
    else if(R&&me.stTimer<5){me.vx=Math.min(SPD,me.vx+0.6);if(me.state==='idle')me.state='walk';}
    else{me.vx*=0.65;if(Math.abs(me.vx)<0.1){me.vx=0;if(me.state==='walk')me.state='idle';}}

    if((keys['w']||keys['ArrowUp'])&&me.y>=GND-62){me.vy=JF;me.state='jump';}

    const canBlock=(keys['s']||keys['ArrowDown'])&&me.y>=GND-62&&me.stTimer===0;
    me.blocking=canBlock;
    if(canBlock&&me.state!=='punch'&&me.state!=='kick'&&me.state!=='special')me.state='block';
    else if(me.state==='block'&&!canBlock)me.state='idle';

    if(keys['j']&&me.stTimer===0)attack(me,opp,'punch',14,65);
    if(keys['k']&&me.stTimer===0)attack(me,opp,'kick',20,72);
    if(keys['l']&&me.stTimer===0)attack(me,opp,'special',30,88,true);
  }

  me.facing=me.x<opp.x?1:-1;
  phys(f1); phys(f2);
  if(mode==='cpu')cpuAI(opp,me);

  [f1,f2].forEach(f=>{
    if(f.stTimer>0){f.stTimer--;if(f.stTimer===0&&['punch','kick','special','hurt'].includes(f.state))f.state='idle';}
    f.at++; if(f.at%8===0)f.af=1-f.af;
  });

  f1.x=Math.max(5,Math.min(W-50,f1.x));
  f2.x=Math.max(5,Math.min(W-50,f2.x));
  const dx=f2.x-f1.x;
  if(Math.abs(dx)<52){const p=(52-Math.abs(dx))/2*(dx<0?-1:1);f1.x-=p;f2.x+=p;}

  effects=effects.filter(e=>e.t>0);
  effects.forEach(e=>{e.t--;e.x+=(e.vx||0);e.y+=(e.vy||0);e.vy=(e.vy||0)+0.15;});
  floats=floats.filter(t=>t.t>0);
  floats.forEach(t=>{t.t--;t.y-=0.7;});

  syncT++;if(syncT%2===0)syncMe();
}

function phys(f){
  f.vy+=GRAV; f.y+=f.vy; f.x+=f.vx;
  if(f.y>=GND-60){f.y=GND-60;f.vy=0;if(f.state==='jump')f.state='idle';}
}

function attack(me,opp,type,dmg,range,special){
  me.state=type; me.stTimer=type==='punch'?22:type==='kick'?28:38;
  const dist=Math.abs((me.x+20)-(opp.x+20));
  if(dist<range){
    let d=dmg+Math.floor(Math.random()*8);
    if(opp.blocking){d=Math.floor(d*0.12);addFloat('BLOCK!',opp.x+10,opp.y-15,'#88ccff');}
    else{
      const now=Date.now();
      if(now-me.lastHit<700)me.combo++;else me.combo=1;
      me.lastHit=now;
      if(me.combo>=3)addFloat('COMBO x'+me.combo+'!',me.x,me.y-40,'#ffdd44');
    }
    if(mode==='online'){dbUp(ref(db,'pvp3/'+rid),{hit:{t:opp===f1?1:2,d,tp:type,by:myP}});}
    else applyHit(opp,d,type);
    spawnFX(opp.x+20,opp.y+25,type);
  }
}

function applyHit(f,dmg,type){
  const i=f===f1?0:1;
  hp[i]=Math.max(0,hp[i]-dmg);
  f.state='hurt'; f.stTimer=16;
  const dir=f===f1?-1:1;
  f.vx=dir*(type==='special'?9:type==='kick'?5:3);
  f.vy=-3;
  addFloat('-'+dmg,f.x+10,f.y-8,'#ff4444');
  updHUD();
  if(mode==='online')dbUp(ref(db,'pvp3/'+rid),{hp});
  if(hp[i]<=0){f.state='ko';f.stTimer=9999;stopTimer();setTimeout(()=>endRound(i===0?1:0),1200);}
}

function spawnFX(x,y,type){
  const col=type==='special'?'#ff8800':type==='kick'?'#ff4444':'#ffffaa';
  for(let i=0;i<7;i++) effects.push({x,y,vx:(Math.random()-0.5)*6,vy:-2-Math.random()*3,t:18,col,r:2+Math.random()*4});
}
function addFloat(t,x,y,col){floats.push({txt:t,x,y,col,t:55});}

function cpuAI(cpu,player){
  if(cpu.state==='ko'||cpu.state==='hurt')return;
  const dist=Math.abs(cpu.x-player.x);
  const dir=cpu.x>player.x?-1:1;
  if(dist>90){cpu.vx=dir*SPD*0.75;cpu.state='walk';}
  else if(dist<35){cpu.vx=-dir*SPD*0.5;}
  else{cpu.vx*=0.6;if(Math.abs(cpu.vx)<0.1)cpu.vx=0;}
  const isAttacking=['punch','kick','special'].includes(player.state);
  cpu.blocking=isAttacking&&dist<80&&Math.random()<0.4;
  if(cpu.state==='block'&&!cpu.blocking)cpu.state='idle';
  if(cpu.y>=GND-62&&Math.random()<0.008)cpu.vy=JF;
  if(dist<80&&cpu.stTimer===0&&!cpu.blocking&&Math.random()<0.07){
    const r=Math.random();
    if(r<0.5)attack(cpu,player,'punch',14,68);
    else if(r<0.8)attack(cpu,player,'kick',20,75);
    else attack(cpu,player,'special',28,85,true);
  }
}

function endRound(winIdx){
  wins[winIdx]++;
  gameActive=false;
  const wname=winIdx===0?f1.name:f2.name;
  showAnnounce(wname+'\nGANA!',2000);
  updWins();
  if(wins[0]>=2||wins[1]>=2){
    setTimeout(()=>{
      document.getElementById('over-txt').innerHTML='🏆 '+wname.toUpperCase()+'<br>GANA!';
      sw('s-over');showOv();
    },2200);
  } else {
    round++;
    setTimeout(()=>initRound(),2800);
  }
}

function startTimer(){
  stopTimer();
  timerInt=setInterval(()=>{
    timerVal--;
    document.getElementById('timer').textContent=timerVal;
    document.getElementById('timer').style.color=timerVal<=10?'#ff4444':'#fff';
    if(timerVal<=0){
      stopTimer();gameActive=false;
      const w=hp[0]>hp[1]?0:hp[1]>hp[0]?1:-1;
      if(w===-1){showAnnounce('¡EMPATE!',2000);setTimeout(()=>initRound(),2800);}
      else endRound(w);
    }
  },1000);
}
function stopTimer(){clearInterval(timerInt);timerInt=null;}

function showAnnounce(msg,ms){
  const el=document.getElementById('announce');
  el.innerHTML=msg.replace('\n','<br>');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

function updHUD(){
  const pct0=hp[0]/MAX_HP*100, pct1=hp[1]/MAX_HP*100;
  document.getElementById('hp1-bar').style.width=pct0+'%';
  document.getElementById('hp2-bar').style.width=pct1+'%';
  const c0=pct0>50?'linear-gradient(90deg,#44aaff,#88ccff)':pct0>25?'linear-gradient(90deg,#ffaa00,#ffcc44)':'linear-gradient(90deg,#ff2244,#ff6666)';
  const c1=pct1>50?'linear-gradient(90deg,#ff4444,#ff8888)':pct1>25?'linear-gradient(90deg,#ffaa00,#ffcc44)':'linear-gradient(90deg,#ff2244,#ff6666)';
  document.getElementById('hp1-bar').style.background=c0;
  document.getElementById('hp2-bar').style.background=c1;
  document.getElementById('hp1-name').textContent=(f1?f1.name:'J1');
  document.getElementById('hp2-name').textContent=(f2?f2.name:'J2');
}
function updWins(){
  document.getElementById('wins-display').textContent=
    (wins[0]>0?'★'.repeat(wins[0]):'○')+'  '+(wins[1]>0?'★'.repeat(wins[1]):'○');
}

// Draw
function draw(){
  cx.clearRect(0,0,W,H);

  // BG gradient
  const bg=cx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#180820');bg.addColorStop(0.6,'#241030');bg.addColorStop(1,'#100818');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  // Crowd
  CROWD.forEach((c,i)=>{
    const bob=gameActive?Math.sin(frameCount*0.06+c.ph)*(hp[0]<50||hp[1]<50?6:3):0;
    cx.fillStyle=c.col;
    cx.fillRect(c.x-7,GND-c.h+bob,14,c.h);
    cx.beginPath();cx.arc(c.x,GND-c.h-6+bob,8,0,Math.PI*2);cx.fill();
    if(gameActive&&(hp[0]<30||hp[1]<30)){
      // Arms up when exciting
      cx.strokeStyle=c.col;cx.lineWidth=3;cx.lineCap='round';
      cx.beginPath();cx.moveTo(c.x-7,GND-c.h+10+bob);cx.lineTo(c.x-14,GND-c.h-5+bob);cx.stroke();
      cx.beginPath();cx.moveTo(c.x+7,GND-c.h+10+bob);cx.lineTo(c.x+14,GND-c.h-5+bob);cx.stroke();
    }
  });

  // Arena floor
  cx.fillStyle='#3a2a1a';cx.fillRect(0,GND,W,H-GND);
  const flg=cx.createLinearGradient(0,GND,0,GND+10);
  flg.addColorStop(0,'#5a4030');flg.addColorStop(1,'#3a2a1a');
  cx.fillStyle=flg;cx.fillRect(0,GND,W,10);
  // Floor lines
  cx.strokeStyle='rgba(255,200,100,0.07)';cx.lineWidth=1;
  for(let x=0;x<W;x+=50){cx.beginPath();cx.moveTo(x,GND);cx.lineTo(x,H);cx.stroke();}

  // Torches
  TORCHES.forEach(t=>{
    cx.fillStyle='#3a2010';cx.fillRect(t.x-4,GND-55,8,45);
    const fl=Math.sin(frameCount*0.12)*0.4;
    cx.shadowColor='#ff8800';cx.shadowBlur=20;
    cx.fillStyle=`rgba(255,${130+Math.floor(fl*50)},0,0.95)`;
    cx.beginPath();cx.arc(t.x,GND-58,9+fl*2,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(255,220,0,0.6)';
    cx.beginPath();cx.arc(t.x,GND-58,4,0,Math.PI*2);cx.fill();
    cx.shadowBlur=0;
    // Torch light on floor
    const tg=cx.createRadialGradient(t.x,GND,0,t.x,GND,100);
    tg.addColorStop(0,'rgba(255,150,0,0.08)');tg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=tg;cx.fillRect(t.x-100,GND,200,H-GND);
  });

  // Center divider
  cx.strokeStyle='rgba(255,200,100,0.1)';cx.lineWidth=2;cx.setLineDash([6,6]);
  cx.beginPath();cx.moveTo(W/2,GND);cx.lineTo(W/2,H);cx.stroke();
  cx.setLineDash([]);

  // Fighters
  if(f1)drawF(f1,'#44aaff','#1a5588','#ffdd44');
  if(f2)drawF(f2,'#ff4444','#881a1a','#ffffff');

  // Hit effects
  effects.forEach(e=>{
    cx.globalAlpha=Math.max(0,e.t/18);
    cx.fillStyle=e.col;
    cx.beginPath();cx.arc(e.x,e.y,e.r,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;

  // Floating texts
  floats.forEach(t=>{
    const a=Math.min(1,t.t/20);
    cx.globalAlpha=a;
    cx.font='bold 9px "Press Start 2P"';cx.textAlign='center';
    cx.fillStyle=t.col;cx.fillText(t.txt,t.x,t.y);
  });
  cx.globalAlpha=1;
}

function drawF(f,col,dark,hairCol){
  const x=f.x,y=f.y,d=f.facing;
  const ko=f.state==='ko', hurt=f.state==='hurt', block=f.blocking;

  // Shadow
  cx.fillStyle='rgba(0,0,0,0.25)';
  cx.beginPath();cx.ellipse(x+20,GND+6,22,5,0,0,Math.PI*2);cx.fill();

  if(ko){
    // Knocked out - lying flat
    cx.save();cx.translate(x+20,GND-8);cx.rotate(d*Math.PI/2);
    cx.fillStyle=col;cx.fillRect(-28,-10,56,20);
    cx.fillStyle='#f5c5a3';cx.beginPath();cx.arc(-28,0,11,0,Math.PI*2);cx.fill();
    // X eyes
    cx.strokeStyle='#222';cx.lineWidth=2;
    cx.beginPath();cx.moveTo(-32,-4);cx.lineTo(-25,3);cx.stroke();
    cx.beginPath();cx.moveTo(-25,-4);cx.lineTo(-32,3);cx.stroke();
    cx.restore();return;
  }

  // Hurt flash
  if(hurt&&Math.floor(frameCount/4)%2===0)return;

  cx.save();cx.translate(x,y);

  // Legs
  const walk=f.state==='walk';
  const lb=walk?Math.sin(f.at*0.25)*8:0;
  cx.fillStyle=dark;
  cx.fillRect(7,42+lb,11,20);cx.fillRect(22,42-lb,11,20);
  cx.fillStyle='#111';
  cx.fillRect(d>0?5:7,60+lb,15,6);cx.fillRect(d>0?20:22,60-lb,15,6);

  // Body
  cx.fillStyle=col;cx.fillRect(5,10,30,34);
  cx.fillStyle=dark;cx.fillRect(5,36,30,8);
  // Belt buckle
  cx.fillStyle='#ffdd44';cx.fillRect(16,37,8,5);
  // Shirt detail
  cx.fillStyle='rgba(255,255,255,0.12)';cx.fillRect(9,13,12,18);

  // Block shield effect
  if(block){
    cx.fillStyle='rgba(80,140,255,0.35)';
    cx.beginPath();cx.arc(20,20,32,0,Math.PI*2);cx.fill();
    cx.strokeStyle='rgba(120,180,255,0.7)';cx.lineWidth=2;
    cx.beginPath();cx.arc(20,20,32,0,Math.PI*2);cx.stroke();
  }

  // Head
  cx.fillStyle='#f5c5a3';cx.beginPath();cx.arc(20,-4,13,0,Math.PI*2);cx.fill();
  cx.fillStyle=hairCol;cx.beginPath();cx.arc(20,-10,12,Math.PI,0);cx.fill();
  // Eyes
  const ex=d>0?26:11;
  cx.fillStyle='#111';cx.fillRect(ex,-8,5,4);
  // Angry brows
  cx.strokeStyle='#111';cx.lineWidth=2;cx.lineCap='round';
  if(hurt){cx.beginPath();cx.moveTo(ex-1,-11);cx.lineTo(ex+5,-8);cx.stroke();}
  else{cx.beginPath();cx.moveTo(ex-1,-12);cx.lineTo(ex+5,-9);cx.stroke();}

  // Arms
  cx.strokeStyle='#f5c5a3';cx.lineWidth=6;cx.lineCap='round';

  if(f.state==='punch'){
    const ext=d*(18+f.stTimer*0.8);
    cx.beginPath();cx.moveTo(20,18);cx.lineTo(20+ext,12);cx.stroke();
    cx.beginPath();cx.moveTo(20,18);cx.lineTo(20-d*10,26);cx.stroke();
    cx.shadowColor='rgba(255,220,100,0.8)';cx.shadowBlur=10;
    cx.fillStyle='rgba(255,210,80,0.7)';
    cx.beginPath();cx.arc(20+ext,12,7,0,Math.PI*2);cx.fill();
    cx.shadowBlur=0;
  } else if(f.state==='kick'){
    // Kick leg
    const kext=d*(22+f.stTimer*0.9);
    cx.strokeStyle=dark;cx.lineWidth=8;
    cx.beginPath();cx.moveTo(20,38);cx.lineTo(20+kext,25);cx.stroke();
    cx.fillStyle='#111';cx.fillRect(20+kext-7,20,15,7);
    cx.strokeStyle='#f5c5a3';cx.lineWidth=6;
    cx.beginPath();cx.moveTo(8,18);cx.lineTo(2,30);cx.stroke();
    cx.beginPath();cx.moveTo(32,18);cx.lineTo(38,28);cx.stroke();
  } else if(f.state==='special'){
    // Both hands forward, energy ball
    cx.beginPath();cx.moveTo(8,18);cx.lineTo(8+d*28,8);cx.stroke();
    cx.beginPath();cx.moveTo(32,18);cx.lineTo(32+d*28,8);cx.stroke();
    const ex2=20+d*34;
    cx.shadowColor='#ff8800';cx.shadowBlur=15;
    cx.fillStyle='rgba(255,120,0,0.9)';
    cx.beginPath();cx.arc(ex2,8,13,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(255,220,0,0.7)';
    cx.beginPath();cx.arc(ex2,8,7,0,Math.PI*2);cx.fill();
    cx.shadowBlur=0;
  } else {
    const sw2=walk?Math.sin(f.at*0.25)*10:0;
    cx.beginPath();cx.moveTo(8,18);cx.lineTo(2,32+sw2);cx.stroke();
    cx.beginPath();cx.moveTo(32,18);cx.lineTo(38,32-sw2);cx.stroke();
  }

  if(f.state==='jump'){
    cx.fillStyle='rgba(255,255,255,0.06)';
    for(let i=1;i<=3;i++)cx.fillRect(4,8+i*14,32,8);
  }

  cx.restore();
}

function hideOv(){document.getElementById('overlay').style.display='none';}
function showOv(){document.getElementById('overlay').style.display='flex';}
function sw(id){['s-menu','s-wait','s-over'].forEach(s=>document.getElementById(s).style.display='none');document.getElementById(id).style.display='block';}

document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
cx.fillStyle='#180820';cx.fillRect(0,0,W,H);
</script>
