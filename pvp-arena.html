<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PvP Arena</title>
<script src="https://play.workadventu.re/iframe_api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'VT323', monospace;
    font-size: 18px;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Pixel grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,100,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,100,0.03) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
  }

  #arena {
    width: 360px;
    background: #0f1a0f;
    border: 3px solid #22ff44;
    box-shadow: 0 0 20px #22ff4440, inset 0 0 20px #00000080;
    padding: 16px;
    position: relative;
  }

  /* Scanline effect */
  #arena::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: #ffdd00;
    text-align: center;
    text-shadow: 0 0 10px #ffdd0080;
    margin-bottom: 14px;
    letter-spacing: 2px;
  }

  .fighters {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }

  .fighter {
    flex: 1;
    background: #0a120a;
    border: 2px solid #1a3a1a;
    padding: 10px 8px;
    text-align: center;
    transition: border-color 0.2s;
  }

  .fighter.active {
    border-color: #22ff44;
    box-shadow: 0 0 8px #22ff4440;
  }

  .fighter.hurt {
    animation: hurt 0.4s steps(2);
    border-color: #ff2244 !important;
  }

  .fighter-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #88ff88;
    margin-bottom: 8px;
    word-break: break-all;
  }

  .fighter-sprite {
    font-size: 30px;
    line-height: 1;
    margin-bottom: 8px;
    display: block;
  }

  .hp-label {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 4px;
  }

  .hp-bar-wrap {
    background: #1a1a1a;
    border: 1px solid #333;
    height: 14px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }

  .hp-bar {
    height: 100%;
    transition: width 0.3s steps(5), background 0.3s;
    background: #22ff44;
  }

  .hp-bar.low { background: #ffaa00; }
  .hp-bar.critical { background: #ff2244; animation: blink 0.5s steps(1) infinite; }

  .hp-text {
    font-size: 16px;
    color: #fff;
    margin-top: 4px;
  }

  .vs-badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: #ff4444;
    text-shadow: 0 0 10px #ff444480;
    align-self: center;
    flex-shrink: 0;
  }

  #log {
    background: #050e05;
    border: 1px solid #1a3a1a;
    padding: 8px;
    height: 90px;
    overflow-y: auto;
    margin-bottom: 12px;
    font-size: 15px;
    line-height: 1.5;
    scroll-behavior: smooth;
  }

  #log p {
    color: #88cc88;
    padding: 1px 0;
  }
  #log p.dmg { color: #ff6655; }
  #log p.heal { color: #55ff99; }
  #log p.system { color: #ffdd00; }
  #log p.win { color: #fff; font-family: 'Press Start 2P', monospace; font-size: 9px; }
  #log p.death { color: #ff2244; }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  button {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 10px 6px;
    border: 2px solid;
    cursor: pointer;
    background: transparent;
    transition: all 0.1s;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }

  button:active { transform: translateY(2px); }

  .btn-attack {
    color: #ff4444;
    border-color: #ff4444;
  }
  .btn-attack:hover {
    background: #ff444420;
    box-shadow: 0 0 8px #ff444440;
  }

  .btn-special {
    color: #ffaa00;
    border-color: #ffaa00;
  }
  .btn-special:hover {
    background: #ffaa0020;
    box-shadow: 0 0 8px #ffaa0040;
  }

  .btn-heal {
    color: #22ff44;
    border-color: #22ff44;
  }
  .btn-heal:hover {
    background: #22ff4420;
    box-shadow: 0 0 8px #22ff4440;
  }

  .btn-defend {
    color: #44aaff;
    border-color: #44aaff;
  }
  .btn-defend:hover {
    background: #44aaff20;
    box-shadow: 0 0 8px #44aaff40;
  }

  button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    box-shadow: none;
  }

  .cooldown-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: currentColor;
    width: 0%;
    transition: width linear;
  }

  #status-bar {
    text-align: center;
    font-size: 14px;
    color: #aaa;
    border-top: 1px solid #1a3a1a;
    padding-top: 8px;
  }

  #status-bar .turn-indicator {
    color: #22ff44;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
  }

  #waiting-screen {
    text-align: center;
    padding: 20px 0;
  }

  #waiting-screen .pulse {
    animation: pulse 1.5s steps(3) infinite;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #22ff44;
    margin-bottom: 14px;
  }

  #waiting-screen .player-info {
    color: #88ff88;
    font-size: 16px;
    margin-top: 10px;
  }

  #game-over {
    display: none;
    text-align: center;
    padding: 10px 0;
  }

  #winner-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #ffdd00;
    text-shadow: 0 0 15px #ffdd00;
    margin-bottom: 12px;
    animation: pulse 0.8s steps(2) infinite;
  }

  .btn-restart {
    color: #22ff44;
    border-color: #22ff44;
    width: 100%;
    margin-top: 6px;
    font-size: 9px;
    padding: 12px;
  }

  @keyframes hurt {
    0%, 100% { background: #0a120a; }
    50% { background: #3a0a0a; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .badge-uses {
    font-size: 12px;
    color: #888;
    display: block;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div id="arena">
  <h1>⚔ PVP ARENA ⚔</h1>

  <!-- Waiting screen -->
  <div id="waiting-screen">
    <div class="pulse">BUSCANDO RIVAL...</div>
    <div style="font-size:40px; margin: 10px 0;">⚔️</div>
    <div class="player-info" id="my-name-display">Cargando...</div>
    <div style="color:#555; font-size:14px; margin-top:10px;">
      Acércate a otro jugador<br>para iniciar el duelo
    </div>
  </div>

  <!-- Battle screen -->
  <div id="battle-screen" style="display:none">
    <div class="fighters">
      <div class="fighter active" id="f1">
        <div class="fighter-name" id="f1-name">TÚ</div>
        <span class="fighter-sprite">🧙</span>
        <div class="hp-label">HP</div>
        <div class="hp-bar-wrap">
          <div class="hp-bar" id="f1-bar" style="width:100%"></div>
        </div>
        <div class="hp-text"><span id="f1-hp">100</span>/100</div>
      </div>

      <div class="vs-badge">VS</div>

      <div class="fighter" id="f2">
        <div class="fighter-name" id="f2-name">RIVAL</div>
        <span class="fighter-sprite">🧝</span>
        <div class="hp-label">HP</div>
        <div class="hp-bar-wrap">
          <div class="hp-bar" id="f2-bar" style="width:100%"></div>
        </div>
        <div class="hp-text"><span id="f2-hp">100</span>/100</div>
      </div>
    </div>

    <div id="log"></div>

    <div class="controls" id="action-buttons">
      <button class="btn-attack" id="btn-attack" onclick="doAction('attack')">
        ⚔ ATACAR
        <span class="badge-uses" id="atk-uses"></span>
        <div class="cooldown-bar" id="cd-attack"></div>
      </button>
      <button class="btn-special" id="btn-special" onclick="doAction('special')">
        💥 ESPECIAL
        <span class="badge-uses" id="spc-uses">x2</span>
        <div class="cooldown-bar" id="cd-special"></div>
      </button>
      <button class="btn-heal" id="btn-heal" onclick="doAction('heal')">
        💊 CURAR
        <span class="badge-uses" id="heal-uses">x2</span>
        <div class="cooldown-bar" id="cd-heal"></div>
      </button>
      <button class="btn-defend" id="btn-defend" onclick="doAction('defend')">
        🛡 DEFENDER
        <span class="badge-uses" id="def-uses">x3</span>
        <div class="cooldown-bar" id="cd-defend"></div>
      </button>
    </div>

    <div id="status-bar">
      <span class="turn-indicator" id="turn-text">TU TURNO</span>
    </div>

    <div id="game-over">
      <div id="winner-text">¡VICTORIA!</div>
      <button class="btn-restart" onclick="restartGame()">▶ NUEVA PARTIDA</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  PvP ARENA — WorkAdventure iFrame Script
//  Funciona en el plan FREE via iFrame API
// ═══════════════════════════════════════════

const MAX_HP = 100;

let myName = "Tú";
let enemyName = "Rival";
let enemyPlayer = null;

let myHP = MAX_HP;
let enemyHP = MAX_HP;

let myTurn = true;
let gameActive = false;
let defending = false;

let specialUses = 2;
let healUses = 2;
let defendUses = 3;

const log = document.getElementById('log');

function addLog(msg, type = '') {
  const p = document.createElement('p');
  p.className = type;
  p.textContent = msg;
  log.appendChild(p);
  log.scrollTop = log.scrollHeight;
}

function updateHP(who, val) {
  const hp = Math.max(0, Math.min(MAX_HP, val));
  const pct = (hp / MAX_HP) * 100;
  const bar = document.getElementById(who + '-bar');
  const txt = document.getElementById(who + '-hp');

  bar.style.width = pct + '%';
  bar.className = 'hp-bar' + (pct <= 25 ? ' critical' : pct <= 50 ? ' low' : '');
  txt.textContent = hp;

  if (who === 'f1') myHP = hp;
  else enemyHP = hp;
}

function hurtAnimation(fighterId) {
  const el = document.getElementById(fighterId);
  el.classList.add('hurt');
  setTimeout(() => el.classList.remove('hurt'), 400);
}

function setTurn(isMyTurn) {
  myTurn = isMyTurn;
  document.getElementById('turn-text').textContent = isMyTurn ? '⚡ TU TURNO' : '⏳ TURNO DEL RIVAL';
  const btns = document.querySelectorAll('#action-buttons button');
  btns.forEach(b => b.disabled = !isMyTurn);
  document.getElementById('f1').classList.toggle('active', isMyTurn);
  document.getElementById('f2').classList.toggle('active', !isMyTurn);
}

function cooldown(btnId, seconds) {
  const btn = document.getElementById(btnId);
  const bar = document.getElementById('cd-' + btnId.replace('btn-', ''));
  if (!bar) return;
  btn.disabled = true;
  bar.style.transition = 'none';
  bar.style.width = '100%';
  setTimeout(() => {
    bar.style.transition = `width ${seconds}s linear`;
    bar.style.width = '0%';
  }, 50);
  setTimeout(() => { if (!gameActive || !myTurn) return; btn.disabled = false; }, seconds * 1000);
}

function doAction(type) {
  if (!myTurn || !gameActive) return;
  defending = false;

  let dmg = 0;
  let msg = '';

  if (type === 'attack') {
    dmg = Math.floor(Math.random() * 20) + 10; // 10-29
    msg = `⚔ ${myName} ataca por ${dmg} de daño!`;
    updateHP('f2', enemyHP - dmg);
    hurtAnimation('f2');
    addLog(msg, 'dmg');
    // Notify rival via WA state
    try { WA.player.state.saveVariable('pvp_action', { type: 'attack', dmg, from: myName }); } catch(e){}

  } else if (type === 'special') {
    if (specialUses <= 0) return;
    specialUses--;
    document.getElementById('spc-uses').textContent = `x${specialUses}`;
    dmg = Math.floor(Math.random() * 35) + 25; // 25-59
    msg = `💥 ${myName} usa ESPECIAL por ${dmg}!`;
    updateHP('f2', enemyHP - dmg);
    hurtAnimation('f2');
    addLog(msg, 'dmg');
    if (specialUses <= 0) document.getElementById('btn-special').disabled = true;
    try { WA.player.state.saveVariable('pvp_action', { type: 'special', dmg, from: myName }); } catch(e){}

  } else if (type === 'heal') {
    if (healUses <= 0) return;
    healUses--;
    document.getElementById('heal-uses').textContent = `x${healUses}`;
    const heal = Math.floor(Math.random() * 15) + 15; // 15-29
    msg = `💊 ${myName} se cura ${heal} HP!`;
    updateHP('f1', myHP + heal);
    addLog(msg, 'heal');
    if (healUses <= 0) document.getElementById('btn-heal').disabled = true;
    try { WA.player.state.saveVariable('pvp_action', { type: 'heal', val: heal, from: myName }); } catch(e){}

  } else if (type === 'defend') {
    if (defendUses <= 0) return;
    defendUses--;
    document.getElementById('def-uses').textContent = `x${defendUses}`;
    defending = true;
    msg = `🛡 ${myName} se pone en guardia!`;
    addLog(msg, '');
    if (defendUses <= 0) document.getElementById('btn-defend').disabled = true;
    try { WA.player.state.saveVariable('pvp_action', { type: 'defend', from: myName }); } catch(e){}
  }

  checkWin();
  if (gameActive) setTurn(false);
}

function enemyTurn() {
  // Simple AI for solo testing OR called when rival's WA variable updates
  if (!gameActive) return;
  const actions = ['attack', 'attack', 'attack', 'special', 'heal', 'defend'];
  const pick = actions[Math.floor(Math.random() * actions.length)];
  let dmg = 0;

  setTimeout(() => {
    if (pick === 'attack') {
      dmg = Math.floor(Math.random() * 20) + 10;
      if (defending) { dmg = Math.floor(dmg * 0.4); addLog(`🛡 ¡Bloqueaste! Daño reducido a ${dmg}`, ''); }
      updateHP('f1', myHP - dmg);
      hurtAnimation('f1');
      addLog(`⚔ ${enemyName} ataca por ${dmg} de daño!`, 'dmg');
    } else if (pick === 'special') {
      dmg = Math.floor(Math.random() * 35) + 25;
      if (defending) { dmg = Math.floor(dmg * 0.4); addLog(`🛡 ¡Bloqueaste! Daño reducido a ${dmg}`, ''); }
      updateHP('f1', myHP - dmg);
      hurtAnimation('f1');
      addLog(`💥 ${enemyName} usa ESPECIAL por ${dmg}!`, 'dmg');
    } else if (pick === 'heal') {
      const heal = Math.floor(Math.random() * 15) + 15;
      updateHP('f2', enemyHP + heal);
      addLog(`💊 ${enemyName} se cura ${heal} HP!`, 'heal');
    } else {
      addLog(`🛡 ${enemyName} se defiende!`, '');
    }
    defending = false;
    checkWin();
    if (gameActive) setTurn(true);
  }, 1200);
}

function checkWin() {
  if (myHP <= 0) {
    endGame(false);
  } else if (enemyHP <= 0) {
    endGame(true);
  }
}

function endGame(win) {
  gameActive = false;
  document.getElementById('action-buttons').style.display = 'none';
  document.getElementById('status-bar').style.display = 'none';
  document.getElementById('game-over').style.display = 'block';

  const txt = document.getElementById('winner-text');
  if (win) {
    txt.textContent = `🏆 ¡${myName} GANA!`;
    txt.style.color = '#ffdd00';
    addLog(`🏆 ¡${myName} es el campeón!`, 'win');
    try { WA.chat.sendChatMessage(`🏆 ¡${myName} gana el duelo contra ${enemyName}!`, 'Arena PvP'); } catch(e){}
  } else {
    txt.textContent = `💀 ¡${enemyName} GANA!`;
    txt.style.color = '#ff2244';
    addLog(`💀 ${enemyName} ha ganado el duelo.`, 'death');
    try { WA.chat.sendChatMessage(`💀 ${myName} ha sido derrotado por ${enemyName}!`, 'Arena PvP'); } catch(e){}
  }
}

function startGame(rivalName) {
  myHP = MAX_HP;
  enemyHP = MAX_HP;
  specialUses = 2;
  healUses = 2;
  defendUses = 3;
  defending = false;
  gameActive = true;

  enemyName = rivalName || 'Rival';
  document.getElementById('f1-name').textContent = myName;
  document.getElementById('f2-name').textContent = enemyName;
  document.getElementById('spc-uses').textContent = 'x2';
  document.getElementById('heal-uses').textContent = 'x2';
  document.getElementById('def-uses').textContent = 'x3';

  updateHP('f1', MAX_HP);
  updateHP('f2', MAX_HP);
  log.innerHTML = '';

  document.getElementById('waiting-screen').style.display = 'none';
  document.getElementById('battle-screen').style.display = 'block';
  document.getElementById('action-buttons').style.display = 'grid';
  document.getElementById('status-bar').style.display = 'block';
  document.getElementById('game-over').style.display = 'none';

  addLog(`¡El duelo entre ${myName} y ${enemyName} comienza!`, 'system');
  setTurn(true);
}

function restartGame() {
  document.getElementById('battle-screen').style.display = 'none';
  document.getElementById('waiting-screen').style.display = 'block';
  gameActive = false;
  addLog('', '');
}

// ══════════════════════════
//  WorkAdventure Integration
// ══════════════════════════
WA.onInit().then(() => {
  myName = WA.player.name || 'Tú';
  document.getElementById('my-name-display').textContent = `👤 ${myName}`;

  // Track nearby players
  WA.players.configureTracking().then(() => {
    WA.players.onPlayerEnters.subscribe((player) => {
      if (!gameActive) {
        enemyPlayer = player;
        addLog(`${player.name} está cerca. ¡Inicia el duelo!`, 'system');
        // Auto-start when a player gets close
        setTimeout(() => {
          if (!gameActive && enemyPlayer) {
            startGame(player.name);
          }
        }, 1500);
      }
    });

    WA.players.onPlayerLeaves.subscribe((player) => {
      if (gameActive && enemyPlayer && enemyPlayer.id === player.id) {
        addLog(`${player.name} ha abandonado el duelo.`, 'system');
        endGame(true);
      }
    });

    // Listen for rival actions via player variables
    WA.players.onVariableChange('pvp_action').subscribe((event) => {
      if (!gameActive || myTurn) return;
      const action = event.value;
      if (!action || action.from === myName) return;

      if (action.type === 'attack' || action.type === 'special') {
        let dmg = action.dmg;
        if (defending) { dmg = Math.floor(dmg * 0.4); addLog(`🛡 ¡Bloqueaste! Daño reducido a ${dmg}`, ''); }
        updateHP('f1', myHP - dmg);
        hurtAnimation('f1');
        addLog(`${action.type === 'special' ? '💥' : '⚔'} ${enemyName} ataca por ${dmg}!`, 'dmg');
        defending = false;
      } else if (action.type === 'heal') {
        updateHP('f2', enemyHP + action.val);
        addLog(`💊 ${enemyName} se cura ${action.val} HP!`, 'heal');
      } else if (action.type === 'defend') {
        addLog(`🛡 ${enemyName} se defiende!`, '');
      }

      checkWin();
      if (gameActive) setTurn(true);
    });
  });

}).catch(() => {
  // Fallback: demo mode sin WorkAdventure (para probar el HTML solo)
  myName = 'Jugador';
  document.getElementById('my-name-display').textContent = `👤 Demo Mode`;
  setTimeout(() => startGame('CPU Enemy'), 1000);
  // In demo, enemy takes turns automatically
  const origSetTurn = setTurn;
  window.setTurn = function(isMyTurn) {
    origSetTurn(isMyTurn);
    if (!isMyTurn && gameActive) enemyTurn();
  };
});
</script>
</body>
</html>
