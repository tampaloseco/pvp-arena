<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🔤 Wordle Equipo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#121213;
    font-family:'VT323',monospace;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:10px;
  }
  h1 { font-family:'Press Start 2P',monospace; font-size:10px; color:#538d4e; text-shadow:0 0 15px #538d4e88; margin-bottom:8px; letter-spacing:2px; text-align:center; }

  .btn {
    font-family:'Press Start 2P',monospace;
    font-size:8px;
    padding:10px 16px;
    border:2px solid;
    background:transparent;
    cursor:pointer;
    transition:all 0.15s;
  }
  .btn:hover { filter:brightness(1.4); }
  .btn-green { color:#538d4e; border-color:#538d4e; }
  .btn-green:hover { background:#538d4e22; }
  .btn-gray { color:#818384; border-color:#818384; }
  .btn-gray:hover { background:#81838422; }
  .btn-yellow { color:#b59f3b; border-color:#b59f3b; }
  .btn-yellow:hover { background:#b59f3b22; }

  input[type=text] {
    background:#121213;
    border:2px solid #ffffff22;
    color:#fff;
    font-family:'VT323',monospace;
    font-size:18px;
    padding:8px 12px;
    outline:none;
    text-align:center;
  }
  input:focus { border-color:#538d4e; }

  /* LOBBY */
  #lobby {
    position:fixed; inset:0;
    background:#121213;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:12px; z-index:10;
  }
  .code-display { font-family:'Press Start 2P',monospace; font-size:22px; color:#538d4e; text-shadow:0 0 15px #538d4e; letter-spacing:6px; }
  .lbl { font-size:14px; color:#ffffff44; text-align:center; }

  /* GAME */
  #game { display:flex; gap:16px; align-items:flex-start; }

  /* Grid */
  #grid {
    display:grid;
    grid-template-rows:repeat(6,1fr);
    gap:5px;
  }
  .grid-row { display:flex; gap:5px; }
  .tile {
    width:52px; height:52px;
    border:2px solid #3a3a3c;
    display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P',monospace;
    font-size:18px;
    font-weight:bold;
    text-transform:uppercase;
    transition:background 0.3s, border-color 0.3s;
    position:relative;
  }
  .tile.filled { border-color:#565758; animation:pop 0.1s; }
  .tile.correct { background:#538d4e; border-color:#538d4e; color:#fff; }
  .tile.present { background:#b59f3b; border-color:#b59f3b; color:#fff; }
  .tile.absent { background:#3a3a3c; border-color:#3a3a3c; color:#fff; }
  .tile .player-tag {
    position:absolute; bottom:1px; right:2px;
    font-size:6px; color:rgba(255,255,255,0.6);
    font-family:'VT323',monospace;
  }
  @keyframes pop { 0%{transform:scale(0.8)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .shake { animation:shake 0.3s; }

  /* Keyboard */
  #keyboard { margin-top:10px; }
  .kb-row { display:flex; gap:4px; margin-bottom:4px; justify-content:center; }
  .key {
    font-family:'Press Start 2P',monospace;
    font-size:7px;
    padding:12px 6px;
    min-width:30px;
    border:none;
    border-radius:3px;
    cursor:pointer;
    background:#818384;
    color:#fff;
    transition:background 0.2s;
    text-transform:uppercase;
  }
  .key.wide { min-width:52px; font-size:6px; }
  .key.correct { background:#538d4e; }
  .key.present { background:#b59f3b; }
  .key.absent { background:#3a3a3c; }
  .key:hover { filter:brightness(1.2); }

  /* Panel */
  #panel { width:220px; display:flex; flex-direction:column; gap:8px; }
  .box { background:#1a1a1b; border:1px solid #3a3a3c; padding:10px; border-radius:4px; }
  .box h3 { font-family:'Press Start 2P',monospace; font-size:7px; color:#538d4e; margin-bottom:8px; }
  .player-row { font-size:15px; padding:3px 0; border-bottom:1px solid #ffffff08; display:flex; justify-content:space-between; }
  .player-row .pts { font-family:'Press Start 2P',monospace; font-size:7px; color:#b59f3b; }

  /* Chat */
  #chat-log { height:100px; overflow-y:auto; font-size:14px; line-height:1.6; }
  #chat-log p { color:#888; }
  #chat-log p.system { color:#538d4e; font-size:12px; }
  #chat-log p.win { color:#ffdd00; }
  #chat-input-row { display:flex; gap:4px; margin-top:6px; }
  #chat-input { flex:1; font-size:15px; text-align:left; }
  #chat-send { font-family:'Press Start 2P',monospace; font-size:6px; padding:6px 10px; border:2px solid #538d4e; color:#538d4e; background:transparent; cursor:pointer; }

  #status-msg { font-family:'Press Start 2P',monospace; font-size:9px; text-align:center; min-height:20px; color:#ffdd00; margin-top:6px; }
  #turn-info { text-align:center; font-size:15px; color:#aaa; margin-bottom:6px; }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>🔤 WORDLE<br>EN EQUIPO</h1>
  <div class="lbl">ADIVINA LA PALABRA<br>ENTRE TODOS EN 6 INTENTOS</div>
  <input id="name-input" type="text" placeholder="TU NOMBRE" maxlength="16" style="width:240px;" />
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-green" onclick="createRoom()">🆕 CREAR</button>
    <div style="display:flex;gap:6px;align-items:center;">
      <input id="join-code" type="text" maxlength="4" placeholder="CÓDIGO" style="width:90px;font-size:15px;" oninput="this.value=this.value.toUpperCase()"/>
      <button class="btn btn-gray" onclick="joinRoom()">▶ UNIRSE</button>
    </div>
  </div>
  <div id="lobby-code-wrap" style="display:none;text-align:center">
    <div class="lbl">CÓDIGO:</div>
    <div class="code-display" id="lobby-code"></div>
  </div>
  <div id="lobby-players-info" class="lbl"></div>
  <button id="lobby-start" class="btn btn-green" style="display:none;" onclick="startGame()">▶ EMPEZAR</button>
</div>

<h1>🔤 WORDLE EN EQUIPO</h1>
<div id="turn-info"></div>
<div id="game">
  <div>
    <div id="grid"></div>
    <div id="keyboard"></div>
    <div id="status-msg"></div>
  </div>
  <div id="panel">
    <div class="box">
      <h3>🔤 PISTA</h3>
      <div id="hint-area" style="font-size:15px;color:#aaa;line-height:1.7;">
        🟩 Letra correcta en su lugar<br>
        🟨 Letra existe, lugar incorrecto<br>
        ⬛ Letra no existe
      </div>
    </div>
    <div class="box">
      <h3>👥 JUGADORES</h3>
      <div id="players-list"></div>
      <div id="score-list" style="margin-top:8px;"></div>
    </div>
    <div class="box">
      <h3>💬 CHAT</h3>
      <div id="chat-log"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Pista, debate..." maxlength="60" />
        <button id="chat-send" onclick="sendChat()">→</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, push }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxMJXKfGJAngeSi-JbrtieIgyZZN5Q6P8",
  authDomain: "billar-workadventure.firebaseapp.com",
  databaseURL: "https://billar-workadventure-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "billar-workadventure",
  storageBucket: "billar-workadventure.firebasestorage.app",
  messagingSenderId: "773546684259",
  appId: "1:773546684259:web:034a2dcd3702d8b5766d56"
};

// Hard Spanish 5-letter words (adult level)
const WORDS = [
  'ABUSO','ACERO','AGUJA','ALTAR','AMBAR','ANCLA','ARBOL','ARCOS','ARDID','ARGOT',
  'ASADO','ASALTO','ATRIL','AVARO','AVION','AZOTE','BALSA','BANCA','BANDO','BARCO',
  'BRAVO','BRISA','BROCE','BUCLE','BUZÓN','CACAO','CAÍDA','CALIZ','CAMPO','CANAL',
  'CAÑON','CAPAZ','CASCO','CAVAR','CERCO','CHAOS','CIFRA','CIRCO','CLAVO','COBRA',
  'COBRE','CODEX','COIMA','COLMO','COMBO','CÓMIC','CORAL','CORRA','CORVO','COSMO',
  'CRACK','CUEVA','CULPA','CURVA','DELTA','DIQUE','DISCO','DOGMA','DRAMA','DUCHO',
  'DUELO','ECHAR','EFEBO','ÉLITE','ENFADO','ENVÍO','ÉPICO','ERROR','ESCUDO','ESPÍA',
  'ESTÍO','ETAPA','FALSO','FARSA','FAVOR','FINCA','FISGO','FOBIA','FONDO','FORMA',
  'FOSIL','FRENO','FRESA','FRUTA','FUEGO','FUGAZ','FÚTIL','GARRA','GENIO','GLOSA',
  'GOLPE','GORDO','GRAMO','GRANO','GRASA','GRAVE','GRUPO','GUSTO','HAFIZ','HAMPA',
  'HONDO','HUMOR','HURTO','ICONO','ÍGNEO','ILUSO','ÍNDEX','INÉDITO','INFRA','INSTA',
  'INTRO','IROSO','JAULA','JERGA','JUEGO','KARMA','LAPSO','LASER','LAXO','LETARGO',
  'LIDIA','LIGAS','LIMBO','LITRO','LOGRO','LUCHA','LUSTRE','MACRO','MANGA','MANGO',
  'MAÑA','MARCA','MAREO','MATAR','MEDIA','MENTA','MICRO','MINAR','MÍNIMO','MIRLO',
  'MODUS','MOLDE','MOLINO','MONZA','MURAL','NEXO','NICHO','NOCHE','NORMA','NORIA',
  'NUDGE','OBLÍO','OCASO','ODIO','OFERTA','ORDEN','ÓSEO','PACOS','PALCO','PALMO',
  'PANDEO','PANEL','PAUSA','PEPLO','PERSA','PIBÓN','PILÓN','PIREX','PISTA','PLANO',
  'PLAZA','PLOMO','PODER','PRIMO','PULSO','PURGA','RABIA','RANGO','RASGO','RAZÓN',
  'REBUS','REPASO','RETAR','RETRO','RIGOR','RITMO','ROBOT','ROCÍO','RONDA','RUBOR',
  'RUGBY','RUIDO','SABOR','SAGAZ','SALVO','SAVIA','SELVA','SEPIA','SIGNO','SISMO',
  'SLANG','SMASH','SONAR','SÓTANO','SPRAY','TABOO','TACHA','TÁCITO','TALÓN','TANGO',
  'TÁPER','TARSO','TECLA','TEMPO','TESIS','TIARA','TIMÓN','TINTO','TOBOGÁN','TÓTEM',
  'TRAGO','TRAMA','TRUCO','TUMOR','TURBO','TUTEO','ÚNICO','USURA','VALOR','VASCO',
  'VASTO','VEJEZ','VERSO','VICIO','VIGOR','VIRGO','VIRUS','VOCAL','VODKA','VUELO',
  'YACEN','YARDA','YERBA','YERMO','ZARPA','ZORRO','ZUMBA',
];

const VALID_5 = WORDS.filter(w => w.length === 5);

const fbApp = initializeApp(firebaseConfig, 'wordle');
const db = getDatabase(fbApp);

let myId = 'w_' + Math.random().toString(36).substr(2,8);
let myName = '';
let roomId = null;
let isHost = false;
let secretWord = '';
let guesses = [];
let currentInput = '';
let turnPlayerId = null;
let players = {};
let scores = {};
let keyStates = {};
let gameOver = false;
let currentRow = 0;

// Build grid
const grid = document.getElementById('grid');
for (let r=0;r<6;r++) {
  const row = document.createElement('div');
  row.className = 'grid-row';
  row.id = 'row-'+r;
  for (let c=0;c<5;c++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.id = `t-${r}-${c}`;
    row.appendChild(tile);
  }
  grid.appendChild(row);
}

// Build keyboard
const KB_ROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L','Ñ'],
  ['ENTER','Z','X','C','V','B','N','M','⌫']
];
const kbDiv = document.getElementById('keyboard');
KB_ROWS.forEach(row => {
  const r = document.createElement('div');
  r.className = 'kb-row';
  row.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'key' + (k.length > 1 ? ' wide' : '');
    btn.textContent = k;
    btn.id = 'key-'+k;
    btn.onclick = () => handleKey(k);
    r.appendChild(btn);
  });
  kbDiv.appendChild(r);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleKey('ENTER');
  else if (e.key === 'Backspace') handleKey('⌫');
  else if (/^[a-zA-ZñÑ]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

// ── LOBBY ──
window.createRoom = () => {
  myName = document.getElementById('name-input').value.trim() || 'Jugador';
  roomId = Math.random().toString(36).substr(2,4).toUpperCase();
  isHost = true;
  const word = VALID_5[Math.floor(Math.random()*VALID_5.length)];
  set(ref(db,`wrd/${roomId}`), {
    host: myId, word, guesses:null, chat:null, gameOver:false,
    players: { [myId]: { name:myName, score:0 } }, turnOrder: [myId], turnIdx: 0
  });
  document.getElementById('lobby-code-wrap').style.display='block';
  document.getElementById('lobby-code').textContent = roomId;
  document.getElementById('lobby-start').style.display='block';
  listenLobby();
};

window.joinRoom = () => {
  myName = document.getElementById('name-input').value.trim() || 'Jugador';
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code) return;
  roomId = code;
  get(ref(db,`wrd/${roomId}`)).then(snap => {
    if (!snap.exists()) { alert('Sala no encontrada'); return; }
    update(ref(db,`wrd/${roomId}/players`), { [myId]: { name:myName, score:0 } });
    document.getElementById('lobby-players-info').textContent = '✅ Unido!';
    listenLobby();
  });
};

window.startGame = () => {
  get(ref(db,`wrd/${roomId}/players`)).then(snap => {
    const ps = snap.val() || {};
    const order = Object.keys(ps);
    update(ref(db,`wrd/${roomId}`), { turnOrder:order, turnIdx:0, started:true });
  });
};

function listenLobby() {
  onValue(ref(db,`wrd/${roomId}/players`), snap => {
    if (!snap.exists()) return;
    const ps = snap.val();
    document.getElementById('lobby-players-info').textContent = `👥 ${Object.keys(ps).length}: ${Object.values(ps).map(p=>p.name).join(', ')}`;
  });
  onValue(ref(db,`wrd/${roomId}/started`), snap => {
    if (snap.val()) enterGame();
  });
}

function enterGame() {
  document.getElementById('lobby').style.display='none';
  listenGame();
}

function listenGame() {
  onValue(ref(db,`wrd/${roomId}`), snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    players = data.players || {};
    scores = Object.fromEntries(Object.entries(players).map(([id,p])=>[id,p.score||0]));
    secretWord = data.word || '';
    const order = data.turnOrder || [];
    const idx = data.turnIdx || 0;
    turnPlayerId = order[idx % order.length];
    gameOver = data.gameOver || false;
    guesses = data.guesses ? (Array.isArray(data.guesses)?data.guesses:Object.values(data.guesses)) : [];
    currentRow = guesses.length;

    renderGrid();
    renderPlayers();
    updateTurnInfo();
    if (gameOver) showGameOver(data.winner, data.word);
  });

  onValue(ref(db,`wrd/${roomId}/chat`), snap => {
    if (!snap.exists()) return;
    const msgs = snap.val();
    const arr = Array.isArray(msgs)?msgs:Object.values(msgs);
    const log = document.getElementById('chat-log');
    log.innerHTML = '';
    arr.slice(-20).forEach(m => {
      const p = document.createElement('p');
      p.className = m.type||'';
      p.textContent = m.text;
      log.appendChild(p);
    });
    log.scrollTop = log.scrollHeight;
  });
}

function renderGrid() {
  keyStates = {};
  guesses.forEach((g, row) => {
    const result = scoreGuess(g.word, secretWord);
    for (let c=0;c<5;c++) {
      const tile = document.getElementById(`t-${row}-${c}`);
      tile.textContent = g.word[c];
      tile.className = 'tile ' + result[c];
      tile.querySelector('.player-tag')?.remove();
      if (g.player) {
        const tag = document.createElement('span');
        tag.className = 'player-tag';
        tag.textContent = (players[g.player]?.name||'?').slice(0,4);
        tile.appendChild(tag);
      }
      // Update key state
      const letter = g.word[c];
      const priority = {correct:3,present:2,absent:1};
      if (!keyStates[letter] || priority[result[c]] > priority[keyStates[letter]]) {
        keyStates[letter] = result[c];
      }
    }
  });
  // Update keyboard colors
  Object.entries(keyStates).forEach(([k,state]) => {
    const btn = document.getElementById('key-'+k);
    if (btn) { btn.className = 'key' + (btn.classList.contains('wide')?' wide':'') + ' ' + state; }
  });
  // Current input row
  if (!gameOver && currentRow < 6) {
    for (let c=0;c<5;c++) {
      const tile = document.getElementById(`t-${currentRow}-${c}`);
      if (c < currentInput.length) {
        tile.textContent = currentInput[c];
        tile.className = 'tile filled';
      } else {
        tile.textContent = '';
        tile.className = 'tile';
      }
    }
  }
}

function scoreGuess(guess, secret) {
  const result = Array(5).fill('absent');
  const secretArr = secret.split('');
  const guessArr = guess.split('');
  // First pass: correct
  guessArr.forEach((l,i) => { if (l===secretArr[i]) { result[i]='correct'; secretArr[i]=null; guessArr[i]=null; } });
  // Second pass: present
  guessArr.forEach((l,i) => {
    if (l===null) return;
    const idx = secretArr.indexOf(l);
    if (idx !== -1) { result[i]='present'; secretArr[idx]=null; }
  });
  return result;
}

function handleKey(k) {
  if (gameOver || turnPlayerId !== myId) return;
  if (k === '⌫') { currentInput = currentInput.slice(0,-1); }
  else if (k === 'ENTER') { submitGuess(); return; }
  else if (currentInput.length < 5) { currentInput += k; }
  renderGrid();
}

function submitGuess() {
  if (currentInput.length !== 5) {
    showMsg('5 LETRAS'); shakeRow(currentRow); return;
  }
  const guess = currentInput;
  currentInput = '';
  const isCorrect = guess === secretWord;
  const newGuesses = [...guesses, { word:guess, player:myId }];
  const order = [];
  get(ref(db,`wrd/${roomId}`)).then(snap => {
    const data = snap.val();
    const ord = data.turnOrder || [];
    const idx = data.turnIdx || 0;
    const nextIdx = idx + 1;
    const isLastGuess = newGuesses.length >= 6;
    if (isCorrect) {
      const pts = Math.max(1, 7 - newGuesses.length);
      const newScores = {...scores, [myId]: (scores[myId]||0) + pts};
      const updatedPlayers = {...players};
      updatedPlayers[myId] = {...updatedPlayers[myId], score: newScores[myId]};
      update(ref(db,`wrd/${roomId}`), {
        guesses: newGuesses, players: updatedPlayers,
        gameOver: true, winner: myId, turnIdx: nextIdx
      });
      push(ref(db,`wrd/${roomId}/chat`),{text:`🏆 ¡${myName} adivinó la palabra! (+${pts}pts)`,type:'win'});
    } else {
      update(ref(db,`wrd/${roomId}`), {
        guesses: newGuesses, turnIdx: nextIdx,
        ...(isLastGuess ? {gameOver:true, winner:null} : {})
      });
      push(ref(db,`wrd/${roomId}/chat`),{text:`${myName} intentó: ${guess}`,type:''});
    }
  });
}

function showMsg(txt) {
  document.getElementById('status-msg').textContent = txt;
  setTimeout(()=>{ document.getElementById('status-msg').textContent=''; }, 1500);
}
function shakeRow(row) {
  const r = document.getElementById('row-'+row);
  r.classList.add('shake');
  setTimeout(()=>r.classList.remove('shake'),300);
}

function updateTurnInfo() {
  const name = players[turnPlayerId]?.name || '?';
  const isMyTurn = turnPlayerId === myId;
  document.getElementById('turn-info').textContent = isMyTurn ? '⚡ TU TURNO — ¡escribe una palabra!' : `⏳ Turno de ${name}`;
  document.getElementById('turn-info').style.color = isMyTurn ? '#538d4e' : '#888';
}

function renderPlayers() {
  const list = document.getElementById('players-list');
  list.innerHTML = '';
  Object.entries(players).forEach(([id,p]) => {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `<span style="color:${id===myId?'#538d4e':'#ddd'}">${p.name}${id===myId?' (tú)':''}</span><span class="pts">${p.score||0}pts</span>`;
    list.appendChild(row);
  });
}

function showGameOver(winnerId, word) {
  const winnerName = players[winnerId]?.name;
  const msg = winnerName ? `🏆 ¡${winnerName} ganó! Palabra: ${word}` : `😔 Nadie adivinó. Era: ${word}`;
  showMsg(msg);
  setTimeout(() => {
    if (isHost && confirm(`${msg}\n\n¿Nueva partida?`)) {
      const newWord = VALID_5[Math.floor(Math.random()*VALID_5.length)];
      update(ref(db,`wrd/${roomId}`), { word:newWord, guesses:null, gameOver:false, winner:null, turnIdx:0, chat:null });
      guesses=[]; currentInput=''; gameOver=false; keyStates={};
      for(let r=0;r<6;r++)for(let c=0;c<5;c++){const t=document.getElementById(`t-${r}-${c}`);t.textContent='';t.className='tile';}
      document.querySelectorAll('.key').forEach(k=>{k.className='key'+(k.classList.contains('wide')?' wide':'');});
    }
  }, 1500);
}

window.sendChat = () => {
  const input = document.getElementById('chat-input');
  const txt = input.value.trim();
  input.value = '';
  if (!txt) return;
  push(ref(db,`wrd/${roomId}/chat`), { text:`${myName}: ${txt}` });
};
document.getElementById('chat-input').addEventListener('keydown', e => { if(e.key==='Enter') window.sendChat(); });
