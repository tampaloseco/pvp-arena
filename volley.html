<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🏐 Volley Playa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a1628;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100vh; overflow:hidden;
    font-family:'Press Start 2P',monospace;
  }

  #hud {
    display:flex; justify-content:space-between; align-items:center;
    width:700px; margin-bottom:6px; font-size:10px;
  }
  #score-left { color:#ffdd44; text-shadow:0 0 10px #ffdd44; }
  #score-right { color:#ff6644; text-shadow:0 0 10px #ff6644; }
  #hud-center { color:#ffffff88; font-size:7px; text-align:center; }

  canvas { display:block; border-radius:6px; }

  #controls-hint {
    margin-top:6px; color:#ffffff33; font-size:6px;
    display:flex; gap:24px;
  }
  #controls-hint span { color:#ffffff66; }

  /* OVERLAY */
  #overlay {
    position:absolute;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px;
    background:rgba(5,10,20,0.93);
    border-radius:6px;
    padding:28px 36px;
    border:2px solid #ffffff11;
  }
  #overlay-title {
    color:#ffdd44; font-size:14px;
    text-shadow:0 0 20px #ffdd44;
    text-align:center; line-height:2;
  }
  #overlay-sub { color:#ffffff55; font-size:7px; text-align:center; line-height:2.5; }
  .obtn {
    background:transparent; border:2px solid; cursor:pointer;
    font-family:'Press Start 2P',monospace; font-size:8px;
    padding:10px 20px; transition:all 0.15s; width:100%;
    margin-bottom:6px;
  }
  .obtn:hover { filter:brightness(1.4); }
  .obtn-yellow { color:#ffdd44; border-color:#ffdd44; }
  .obtn-yellow:hover { background:#ffdd4422; }
  .obtn-blue { color:#44aaff; border-color:#44aaff; }
  .obtn-blue:hover { background:#44aaff22; }
  .obtn-green { color:#44ffaa; border-color:#44ffaa; }
  .obtn-green:hover { background:#44ffaa22; }
  .obtn-gray { color:#aaa; border-color:#aaa; }
  .obtn-gray:hover { background:#aaaaaa22; }

  #name-inp {
    background:#0a1628; border:2px solid #ffffff33; color:#fff;
    font-family:'Press Start 2P',monospace; font-size:9px;
    padding:8px 12px; width:100%; text-align:center; outline:none;
  }
  #name-inp:focus { border-color:#ffdd44; }
  #code-inp {
    background:#0a1628; border:2px solid #ffffff33; color:#fff;
    font-family:'Press Start 2P',monospace; font-size:9px;
    padding:8px 12px; width:120px; text-align:center; outline:none;
  }
  #code-inp:focus { border-color:#44aaff; }
  .code-big { font-size:22px; color:#44aaff; text-shadow:0 0 15px #44aaff; letter-spacing:4px; }
  .wait-txt { color:#ffffff55; font-size:7px; text-align:center; line-height:2; }
</style>
</head>
<body>

<div id="hud">
  <span id="score-left">0</span>
  <span id="hud-center">VOLLEY PLAYA 🏐</span>
  <span id="score-right">0</span>
</div>

<div style="position:relative;">
  <canvas id="c" width="700" height="420"></canvas>

  <div id="overlay">
    <!-- MAIN MENU -->
    <div id="screen-menu">
      <div id="overlay-title">🏐 VOLLEY<br>PLAYA</div>
      <input id="name-inp" type="text" placeholder="TU NOMBRE" maxlength="14" />
      <br>
      <button class="obtn obtn-yellow" onclick="startVsCPU()">🤖 VS MÁQUINA</button>
      <button class="obtn obtn-blue" onclick="showCreate()">🆕 CREAR PARTIDA ONLINE</button>
      <div style="display:flex;gap:8px;align-items:center;margin-top:2px;">
        <input id="code-inp" type="text" maxlength="4" placeholder="CÓDIGO" oninput="this.value=this.value.toUpperCase()"/>
        <button class="obtn obtn-green" style="margin:0;width:auto;padding:10px 14px;" onclick="joinOnline()">▶ UNIRSE</button>
      </div>
    </div>
    <!-- WAITING -->
    <div id="screen-wait" style="display:none;text-align:center;">
      <div id="overlay-title">⏳ ESPERANDO...</div>
      <div class="wait-txt">COMPARTE ESTE CÓDIGO<br>CON TU RIVAL:</div>
      <div class="code-big" id="room-code-display"></div>
      <div class="wait-txt" style="margin-top:8px;">Esperando jugador 2...</div>
    </div>
    <!-- GAME OVER -->
    <div id="screen-gameover" style="display:none;text-align:center;">
      <div id="overlay-title" id="go-title">FIN</div>
      <button class="obtn obtn-yellow" onclick="resetGame()">▶ REVANCHA</button>
      <button class="obtn obtn-gray" onclick="backToMenu()">🏠 MENÚ</button>
    </div>
  </div>
</div>

<div id="controls-hint">
  <div><span>A/D</span> MOVER &nbsp;<span>W</span> SALTAR &nbsp;<span>S</span> GOLPEAR</div>
  <div><span>← →</span> MOVER &nbsp;<span>↑</span> SALTAR &nbsp;<span>↓</span> GOLPEAR</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update as fbUpdate } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxMJXKfGJAngeSi-JbrtieIgyZZN5Q6P8",
  authDomain: "billar-workadventure.firebaseapp.com",
  databaseURL: "https://billar-workadventure-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "billar-workadventure",
  storageBucket: "billar-workadventure.firebasestorage.app",
  messagingSenderId: "773546684259",
  appId: "1:773546684259:web:034a2dcd3702d8b5766d56"
};
const fbApp = initializeApp(firebaseConfig, 'volley');
const db = getDatabase(fbApp);

// ── CANVAS ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 700, H = 420;

// ── CONSTANTS ──
const GROUND = H - 50;
const NET_X = W / 2;
const NET_H = 90;
const P_W = 28, P_H = 44;
const BALL_R = 14;
const GRAVITY = 0.45;
const JUMP_FORCE = -13;
const P_SPEED = 4.5;
const WIN_SCORE = 7;
const CPU_SPEED = 3.2;

// ── STATE ──
let gameMode = null; // 'cpu' | 'online'
let myPlayer = 1; // 1 or 2
let roomId = null;
let myName = 'Jugador';
let opponentName = 'Rival';
let animId = null;
let keys = {};
let syncTimer = 0;

let p1, p2, ball, scores, serving;

function initEntities() {
  p1 = { x:120, y:GROUND-P_H, vy:0, onGround:true, hitting:false, hitTimer:0, name:myName, score:0 };
  p2 = { x:W-120-P_W, y:GROUND-P_H, vy:0, onGround:true, hitting:false, hitTimer:0, name:opponentName, score:0 };
  ball = { x:NET_X-100, y:GROUND-180, vx:2.5, vy:-3, inPlay:true };
  scores = [0, 0];
  serving = 1;
  updateScoreHUD();
}

// ── MENU ──
window.startVsCPU = () => {
  myName = document.getElementById('name-inp').value.trim() || 'Jugador';
  opponentName = 'CPU 🤖';
  gameMode = 'cpu';
  hideOverlay();
  initEntities();
  startLoop();
};

window.showCreate = () => {
  myName = document.getElementById('name-inp').value.trim() || 'Jugador';
  roomId = Math.random().toString(36).substr(2,4).toUpperCase();
  myPlayer = 1;
  document.getElementById('screen-menu').style.display = 'none';
  document.getElementById('screen-wait').style.display = 'block';
  document.getElementById('room-code-display').textContent = roomId;
  set(ref(db, `voly/${roomId}`), {
    state:'waiting', p1name:myName, p2name:'', scores:[0,0],
    ball:{ x:NET_X-100, y:GROUND-180, vx:2.5, vy:-3 },
    p1:{ x:120, y:GROUND-P_H, vy:0 },
    p2:{ x:W-120-P_W, y:GROUND-P_H, vy:0 }
  });
  onValue(ref(db,`voly/${roomId}/state`), snap => {
    if (snap.val()==='playing') startOnline();
  });
};

window.joinOnline = () => {
  myName = document.getElementById('name-inp').value.trim() || 'Jugador';
  const code = document.getElementById('code-inp').value.trim().toUpperCase();
  if (!code) return;
  roomId = code;
  myPlayer = 2;
  get(ref(db,`voly/${roomId}`)).then(snap => {
    if (!snap.exists()) { alert('Sala no encontrada'); return; }
    opponentName = snap.val().p1name || 'Rival';
    fbUpdate(ref(db,`voly/${roomId}`), { p2name:myName, state:'playing' });
    startOnline();
  });
};

function startOnline() {
  gameMode = 'online';
  hideOverlay();
  initEntities();
  if (myPlayer === 2) {
    p1.name = opponentName;
    p2.name = myName;
  }
  listenOnline();
  startLoop();
}

function listenOnline() {
  onValue(ref(db,`voly/${roomId}`), snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    if (myPlayer === 1) {
      // Update p2 from remote
      if (data.p2) { p2.x=data.p2.x; p2.y=data.p2.y; p2.vy=data.p2.vy; }
      if (data.ball2 && data.ball2.from===2) { ball.x=data.ball2.x; ball.y=data.ball2.y; ball.vx=data.ball2.vx; ball.vy=data.ball2.vy; }
    } else {
      // Update p1 from remote
      if (data.p1) { p1.x=data.p1.x; p1.y=data.p1.y; p1.vy=data.p1.vy; }
      if (data.ball2 && data.ball2.from===1) { ball.x=data.ball2.x; ball.y=data.ball2.y; ball.vx=data.ball2.vx; ball.vy=data.ball2.vy; }
    }
    if (data.scores) { scores = data.scores; updateScoreHUD(); }
    if (data.p1name) p1.name = data.p1name;
    if (data.p2name) p2.name = data.p2name;
  });
}

// ── GAME LOOP ──
function startLoop() {
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ── UPDATE ──
function update() {
  if (!p1) return;

  // ── Player 1 input ──
  const myP = myPlayer === 1 || gameMode === 'cpu' ? p1 : p2;
  const oppP = myPlayer === 1 || gameMode === 'cpu' ? p2 : p1;
  const leftKey = myPlayer===2 ? 'ArrowLeft' : 'a';
  const rightKey = myPlayer===2 ? 'ArrowRight' : 'd';
  const jumpKey = myPlayer===2 ? 'ArrowUp' : 'w';
  const hitKey = myPlayer===2 ? 'ArrowDown' : 's';
  const myLeft = myPlayer===1 ? 0 : NET_X+5;
  const myRight = myPlayer===1 ? NET_X-P_W-5 : W-P_W-5;

  if (keys[leftKey]) myP.x = Math.max(myLeft, myP.x - P_SPEED);
  if (keys[rightKey]) myP.x = Math.min(myRight, myP.x + P_SPEED);
  if (keys[jumpKey] && myP.onGround) { myP.vy = JUMP_FORCE; myP.onGround = false; }
  if (keys[hitKey] && !myP.hitting) { myP.hitting = true; myP.hitTimer = 12; }

  // ── P1 physics ──
  applyPhysics(p1, 0, NET_X-P_W-5);
  applyPhysics(p2, NET_X+5, W-P_W-5);

  // ── CPU AI ──
  if (gameMode === 'cpu') updateCPU();

  // ── Hit timer ──
  [p1, p2].forEach(p => { if (p.hitTimer > 0) { p.hitTimer--; if (p.hitTimer===0) p.hitting=false; } });

  // ── Ball physics ──
  ball.vy += GRAVITY;
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Ball - ground
  if (ball.y + BALL_R >= GROUND) {
    ball.y = GROUND - BALL_R;
    // Point scored
    const scorer = ball.x < NET_X ? 2 : 1;
    scores[scorer-1]++;
    updateScoreHUD();
    if (gameMode==='online') fbUpdate(ref(db,`voly/${roomId}`),{scores});
    if (scores[0]>=WIN_SCORE || scores[1]>=WIN_SCORE) { endGame(); return; }
    resetBall(scorer === 1 ? 2 : 1);
  }

  // Ball - walls
  if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
  if (ball.x + BALL_R >= W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
  // Ball - ceiling
  if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

  // Ball - net
  if (ball.x+BALL_R > NET_X-6 && ball.x-BALL_R < NET_X+6 && ball.y+BALL_R > GROUND-NET_H) {
    if (ball.vx > 0 && ball.x < NET_X) { ball.vx = -Math.abs(ball.vx)*0.7; ball.x = NET_X-6-BALL_R; }
    else if (ball.vx < 0 && ball.x > NET_X) { ball.vx = Math.abs(ball.vx)*0.7; ball.x = NET_X+6+BALL_R; }
  }

  // Ball - player collisions
  hitBall(p1, 1);
  hitBall(p2, 2);

  // Online sync
  if (gameMode==='online') {
    syncTimer++;
    if (syncTimer%3===0) {
      const myPosKey = myPlayer===1 ? 'p1' : 'p2';
      const myPos = myPlayer===1 ? {x:p1.x,y:p1.y,vy:p1.vy} : {x:p2.x,y:p2.y,vy:p2.vy};
      fbUpdate(ref(db,`voly/${roomId}`), {
        [myPosKey]: myPos,
        ball2: {x:ball.x,y:ball.y,vx:ball.vx,vy:ball.vy,from:myPlayer}
      });
    }
  }
}

function applyPhysics(p, minX, maxX) {
  p.vy += GRAVITY;
  p.y += p.vy;
  if (p.y >= GROUND - P_H) { p.y = GROUND - P_H; p.vy = 0; p.onGround = true; }
}

function hitBall(p, side) {
  const bx = ball.x, by = ball.y;
  const px = p.x, py = p.y;
  const inRange = bx > px-BALL_R && bx < px+P_W+BALL_R && by > py-BALL_R && by < py+P_H+BALL_R;
  if (!inRange) return;

  const cx = px + P_W/2;
  const cy = py + P_H/2;
  const dx = bx - cx, dy = by - cy;
  const angle = Math.atan2(dy, dx);
  const speed = p.hitting ? 12 : 8;

  // Direction based on player side
  let vx = Math.cos(angle) * speed;
  let vy = Math.sin(angle) * speed - 3;

  // Force towards opponent's side
  if (side===1) vx = Math.abs(vx) * (p.hitting ? 1.2 : 1);
  else vx = -Math.abs(vx) * (p.hitting ? 1.2 : 1);

  ball.vx = vx;
  ball.vy = Math.min(vy, -4);
  ball.y = py - BALL_R - 2;
}

function updateCPU() {
  const cpu = p2;
  const targetX = ball.vx > 0 ? ball.x - P_W/2 : NET_X - 60;
  if (cpu.x + P_W/2 < targetX - 4) cpu.x = Math.min(W-P_W-5, cpu.x + CPU_SPEED);
  else if (cpu.x + P_W/2 > targetX + 4) cpu.x = Math.max(NET_X+5, cpu.x - CPU_SPEED);
  // CPU jump
  if (ball.vx > 0 && ball.x > NET_X && ball.y < GROUND - 120 && cpu.onGround && Math.abs(cpu.x - ball.x) < 80) {
    cpu.vy = JUMP_FORCE * 0.9; cpu.onGround = false;
  }
  // CPU hit
  if (Math.abs(cpu.x - ball.x) < 40 && Math.abs(cpu.y - ball.y) < 60) {
    cpu.hitting = true; cpu.hitTimer = 8;
  }
}

function resetBall(servePlayer) {
  serving = servePlayer;
  const sx = servePlayer===1 ? 150 : W-150;
  ball = { x:sx, y:GROUND-200, vx: servePlayer===1 ? 2.5 : -2.5, vy:-4, inPlay:true };
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#1a4a8a'); sky.addColorStop(0.6,'#3a8fcc'); sky.addColorStop(1,'#6abfef');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // Sun
  ctx.fillStyle = '#ffe066';
  ctx.shadowColor='#ffe066'; ctx.shadowBlur=30;
  ctx.beginPath(); ctx.arc(80, 70, 30, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // Clouds
  [[200,60,50],[400,40,40],[560,70,35]].forEach(([x,y,r]) => {
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+r*0.7,y+5,r*0.7,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x-r*0.6,y+5,r*0.65,0,Math.PI*2); ctx.fill();
  });

  // Water
  const water = ctx.createLinearGradient(0,GROUND,0,H);
  water.addColorStop(0,'#1a6aaa'); water.addColorStop(1,'#0a3a6a');
  ctx.fillStyle=water; ctx.fillRect(0,GROUND,W,H-GROUND);

  // Sand
  const sand = ctx.createLinearGradient(0,GROUND-8,0,GROUND+2);
  sand.addColorStop(0,'#e8c97a'); sand.addColorStop(1,'#d4a84b');
  ctx.fillStyle=sand; ctx.fillRect(0,GROUND-8,W,10);

  // Net shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.fillRect(NET_X-8, GROUND-NET_H, 16, NET_H);

  // Net post
  ctx.fillStyle='#aaa';
  ctx.fillRect(NET_X-4, GROUND-NET_H-10, 8, NET_H+10);

  // Net
  ctx.strokeStyle='#ffffff88';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(NET_X-3,GROUND-NET_H); ctx.lineTo(NET_X-3,GROUND); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(NET_X+3,GROUND-NET_H); ctx.lineTo(NET_X+3,GROUND); ctx.stroke();
  // Net lines
  for (let y=GROUND-NET_H; y<GROUND; y+=12) {
    ctx.strokeStyle='rgba(255,255,255,0.3)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(NET_X-3,y); ctx.lineTo(NET_X+3,y); ctx.stroke();
  }
  // Net top
  ctx.strokeStyle='#fff'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(NET_X-3,GROUND-NET_H); ctx.lineTo(NET_X+3,GROUND-NET_H); ctx.stroke();

  // Players
  drawPlayer(p1, '#ffdd44', '#ff8800', true);
  drawPlayer(p2, '#ff6644', '#cc2200', false);

  // Ball
  const bgrad = ctx.createRadialGradient(ball.x-BALL_R*0.3, ball.y-BALL_R*0.3, 1, ball.x, ball.y, BALL_R);
  bgrad.addColorStop(0,'#fff'); bgrad.addColorStop(0.4,'#ddeeff'); bgrad.addColorStop(1,'#aaccee');
  ctx.fillStyle=bgrad;
  ctx.shadowColor='rgba(255,255,255,0.5)'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2); ctx.fill();
  // Ball lines
  ctx.strokeStyle='#88aabb'; ctx.lineWidth=1.5; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0.5, Math.PI+0.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, -0.5, Math.PI-0.5); ctx.stroke();
  ctx.shadowBlur=0;

  // Shadow on ground
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(ball.x, GROUND, BALL_R*0.8, 4, 0, 0, Math.PI*2); ctx.fill();
}

function drawPlayer(p, bodyColor, darkColor, isLeft) {
  const x=p.x, y=p.y;
  const hitting = p.hitting;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(x+P_W/2, GROUND, P_W*0.5, 4, 0, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath(); ctx.roundRect(x+4, y+14, P_W-8, P_H-14, 4); ctx.fill();

  // Shorts
  ctx.fillStyle = darkColor;
  ctx.fillRect(x+4, y+P_H-18, P_W-8, 12);

  // Head
  ctx.fillStyle = '#f5c5a3';
  ctx.beginPath(); ctx.arc(x+P_W/2, y+8, 10, 0, Math.PI*2); ctx.fill();

  // Hair
  ctx.fillStyle = darkColor;
  ctx.beginPath(); ctx.arc(x+P_W/2, y+2, 8, Math.PI, 0); ctx.fill();

  // Arm (hitting animation)
  ctx.strokeStyle = '#f5c5a3'; ctx.lineWidth=4; ctx.lineCap='round';
  if (hitting) {
    const armDir = isLeft ? 1 : -1;
    ctx.beginPath();
    ctx.moveTo(x+P_W/2, y+20);
    ctx.lineTo(x+P_W/2 + armDir*18, y+10);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(x+6, y+20); ctx.lineTo(x+2, y+32); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+P_W-6, y+20); ctx.lineTo(x+P_W-2, y+32); ctx.stroke();
  }

  // Name tag
  ctx.fillStyle='rgba(0,0,0,0.5)';
  const name = p.name.length > 8 ? p.name.slice(0,8) : p.name;
  ctx.font='6px "Press Start 2P"';
  const nw = ctx.measureText(name).width;
  ctx.fillRect(x+P_W/2-nw/2-3, y-18, nw+6, 13);
  ctx.fillStyle='#fff';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(name, x+P_W/2, y-11);
}

function updateScoreHUD() {
  document.getElementById('score-left').textContent = `${p1?.name||'J1'}: ${scores[0]}`;
  document.getElementById('score-right').textContent = `${scores[1]}: ${p2?.name||'J2'}`;
}

function endGame() {
  cancelAnimationFrame(animId);
  const winner = scores[0] >= WIN_SCORE ? (p1.name) : (p2.name);
  showGameOver(winner);
}

function showGameOver(winner) {
  const ov = document.getElementById('overlay');
  document.getElementById('screen-menu').style.display='none';
  document.getElementById('screen-wait').style.display='none';
  document.getElementById('screen-gameover').style.display='block';
  document.getElementById('overlay-title').innerHTML=`🏆 ${winner.toUpperCase()}<br>GANA!`;
  ov.style.display='flex';
}

window.resetGame = () => {
  if (gameMode==='cpu') { hideOverlay(); initEntities(); startLoop(); }
  else { location.reload(); }
};

window.backToMenu = () => {
  cancelAnimationFrame(animId);
  showScreen('screen-menu');
};

function hideOverlay() { document.getElementById('overlay').style.display='none'; }
function showScreen(id) {
  document.getElementById('overlay').style.display='flex';
  ['screen-menu','screen-wait','screen-gameover'].forEach(s=>document.getElementById(s).style.display='none');
  document.getElementById(id).style.display='block';
}

// ── INPUT ──
document.addEventListener('keydown', e => {
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.key]=false);

// Initial draw
ctx.fillStyle='#0a1628'; ctx.fillRect(0,0,W,H);
</script>
</body>
</html>
