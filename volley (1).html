<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🏐 Volley Playa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a1628;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100vh; overflow:hidden;
    font-family:'Press Start 2P',monospace;
  }
  #hud {
    display:flex; justify-content:space-between; align-items:center;
    width:700px; margin-bottom:6px; font-size:9px;
  }
  #score-left { color:#ffdd44; }
  #score-right { color:#ff6644; }
  #hud-center { color:#ffffff66; font-size:7px; }
  canvas { display:block; }
  #hints { margin-top:6px; color:#ffffff33; font-size:6px; display:flex; gap:20px; }
  #hints span { color:#ffffff55; }

  #overlay {
    position:absolute;
    background:rgba(5,12,25,0.95);
    border:2px solid #ffffff22;
    border-radius:6px;
    padding:24px 32px;
    display:flex; flex-direction:column; align-items:center; gap:12px;
    min-width:320px;
  }
  .otitle { color:#ffdd44; font-size:13px; text-shadow:0 0 15px #ffdd44; text-align:center; line-height:2; }
  .osub { color:#ffffff44; font-size:7px; text-align:center; line-height:2; }
  .obtn {
    font-family:'Press Start 2P',monospace; font-size:8px;
    padding:10px 16px; border:2px solid; background:transparent;
    cursor:pointer; transition:all 0.15s; width:100%;
  }
  .obtn:hover { filter:brightness(1.5); }
  .by { color:#ffdd44; border-color:#ffdd44; }
  .by:hover { background:#ffdd4420; }
  .bb { color:#44aaff; border-color:#44aaff; }
  .bb:hover { background:#44aaff20; }
  .bg { color:#44ffaa; border-color:#44ffaa; }
  .bg:hover { background:#44ffaa20; }
  .bgr { color:#aaa; border-color:#aaa; }
  .bgr:hover { background:#aaaaaa20; }
  .ninp {
    background:#050d1a; border:2px solid #ffffff22; color:#fff;
    font-family:'Press Start 2P',monospace; font-size:9px;
    padding:8px 10px; width:100%; text-align:center; outline:none;
  }
  .ninp:focus { border-color:#ffdd44; }
  .codebig { font-size:20px; color:#44aaff; text-shadow:0 0 12px #44aaff; letter-spacing:4px; text-align:center; }
  .row { display:flex; gap:8px; width:100%; align-items:center; }
</style>
</head>
<body>

<div id="hud">
  <span id="score-left">Jugador: 0</span>
  <span id="hud-center">🏐 VOLLEY PLAYA</span>
  <span id="score-right">0 :Rival</span>
</div>
<div style="position:relative;">
  <canvas id="c" width="700" height="420"></canvas>
  <div id="overlay">
    <div id="s-menu">
      <div class="otitle" style="margin-bottom:8px;">🏐 VOLLEY<br>PLAYA</div>
      <input class="ninp" id="ninp" type="text" placeholder="TU NOMBRE" maxlength="12" style="margin-bottom:10px;"/>
      <button class="obtn by" id="btn-cpu">🤖 VS MÁQUINA</button>
      <button class="obtn bb" id="btn-create" style="margin-top:4px;">🆕 CREAR PARTIDA ONLINE</button>
      <div class="row" style="margin-top:4px;">
        <input class="ninp" id="cinp" type="text" maxlength="4" placeholder="CÓDIGO" style="width:110px;" oninput="this.value=this.value.toUpperCase()"/>
        <button class="obtn bg" style="margin:0;" id="btn-join">▶ UNIRSE</button>
      </div>
    </div>
    <div id="s-wait" style="display:none; text-align:center;">
      <div class="otitle" style="margin-bottom:8px;">⏳ ESPERANDO...</div>
      <div class="osub">COMPARTE ESTE CÓDIGO:</div>
      <div class="codebig" id="wcode" style="margin:10px 0;"></div>
      <div class="osub">Esperando rival...</div>
    </div>
    <div id="s-over" style="display:none; text-align:center;">
      <div class="otitle" id="over-txt" style="margin-bottom:12px;"></div>
      <button class="obtn by" id="btn-restart">▶ REVANCHA</button>
      <button class="obtn bgr" id="btn-menu" style="margin-top:6px;">🏠 MENÚ</button>
    </div>
  </div>
</div>
<div id="hints">
  <div><span>A</span> IZQ &nbsp;<span>D</span> DER &nbsp;<span>W</span> SALTAR &nbsp;<span>S</span> GOLPEAR</div>
  <div><span>←</span> IZQ &nbsp;<span>→</span> DER &nbsp;<span>↑</span> SALTAR &nbsp;<span>↓</span> GOLPEAR</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update as dbUp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB = {apiKey:"AIzaSyDxMJXKfGJAngeSi-JbrtieIgyZZN5Q6P8",authDomain:"billar-workadventure.firebaseapp.com",databaseURL:"https://billar-workadventure-default-rtdb.europe-west1.firebasedatabase.app",projectId:"billar-workadventure",storageBucket:"billar-workadventure.firebasestorage.app",messagingSenderId:"773546684259",appId:"1:773546684259:web:034a2dcd3702d8b5766d56"};
const db = getDatabase(initializeApp(FB,'vb2'));

const CV=document.getElementById('c'), cx=CV.getContext('2d');
const W=700,H=420,GND=H-50,NX=W/2,NH=90,PW=28,PH=44,BR=14;
const GRAV=0.32,JF=-12,PS=4,WIN=7;

let mode=null,myP=1,rid=null,myName='J1',oppName='J2';
let raf=null,keys={},syncT=0;
let p1=null,p2=null,ball=null,sc=[0,0];

function mkP(x,name){return{x,y:GND-PH,vy:0,grnd:true,hit:false,ht:0,name};}
function mkB(side){const sx=side===1?150:W-150;return{x:sx,y:GND-200,vx:side===1?2:-2,vy:-3};}

function initGame(){
  p1=mkP(130,myName); p2=mkP(W-130-PW,oppName);
  ball=mkB(1); sc=[0,0]; updHUD();
}

// ── BUTTONS ──
document.getElementById('btn-cpu').onclick=function(){
  myName=document.getElementById('ninp').value.trim()||'Jugador';
  oppName='CPU 🤖'; mode='cpu';
  hideOv(); initGame(); startLoop();
};

document.getElementById('btn-create').onclick=function(){
  myName=document.getElementById('ninp').value.trim()||'Jugador';
  rid=Math.random().toString(36).substr(2,4).toUpperCase();
  myP=1; sw('s-wait');
  document.getElementById('wcode').textContent=rid;
  set(ref(db,'vb/'+rid),{state:'wait',p1n:myName,p2n:'',sc:[0,0]});
  onValue(ref(db,'vb/'+rid+'/state'),snap=>{
    if(snap.val()==='play'){mode='online';hideOv();initGame();listenFB();startLoop();}
  });
};

document.getElementById('btn-join').onclick=function(){
  myName=document.getElementById('ninp').value.trim()||'Jugador';
  const code=document.getElementById('cinp').value.trim().toUpperCase();
  if(!code)return;
  rid=code; myP=2;
  get(ref(db,'vb/'+rid)).then(snap=>{
    if(!snap.exists()){alert('Sala no encontrada');return;}
    oppName=snap.val().p1n||'Rival';
    dbUp(ref(db,'vb/'+rid),{p2n:myName,state:'play'});
    mode='online'; hideOv(); initGame();
    p1.name=oppName; p2.name=myName;
    listenFB(); startLoop();
  });
};

document.getElementById('btn-restart').onclick=function(){
  hideOv(); initGame(); startLoop();
};

document.getElementById('btn-menu').onclick=function(){
  cancelAnimationFrame(raf); raf=null;
  sw('s-menu'); document.getElementById('overlay').style.display='flex';
};

// ── FIREBASE ──
function listenFB(){
  onValue(ref(db,'vb/'+rid),snap=>{
    if(!snap.exists()||!p1)return;
    const d=snap.val();
    if(myP===1){
      if(d.p2){p2.x=d.p2.x;p2.y=d.p2.y;}
      if(d.bfrom===2&&d.ball){ball.x=d.ball.x;ball.y=d.ball.y;ball.vx=d.ball.vx;ball.vy=d.ball.vy;}
    }else{
      if(d.p1){p1.x=d.p1.x;p1.y=d.p1.y;}
      if(d.bfrom===1&&d.ball){ball.x=d.ball.x;ball.y=d.ball.y;ball.vx=d.ball.vx;ball.vy=d.ball.vy;}
    }
    if(d.sc){sc=d.sc;updHUD();}
  });
}

// ── LOOP ──
function startLoop(){cancelAnimationFrame(raf);raf=requestAnimationFrame(tick);}
function tick(){gameStep();gameDraw();raf=requestAnimationFrame(tick);}

// ── GAME STEP ──
function gameStep(){
  if(!p1||!ball)return;

  // Controls — both players can use WASD or arrows freely
  const me=(mode==='cpu'||myP===1)?p1:p2;
  const mL=myP===2?NX+5:0, mR=myP===2?W-PW-5:NX-PW-5;

  if(keys['a']||keys['ArrowLeft'])me.x=Math.max(mL,me.x-PS);
  if(keys['d']||keys['ArrowRight'])me.x=Math.min(mR,me.x+PS);
  if((keys['w']||keys['ArrowUp'])&&me.grnd){me.vy=JF;me.grnd=false;}
  if((keys['s']||keys['ArrowDown'])&&!me.hit){me.hit=true;me.ht=14;}

  physP(p1,0,NX-PW-5);
  physP(p2,NX+5,W-PW-5);
  if(mode==='cpu')cpuAI();

  if(p1.ht>0){p1.ht--;if(p1.ht===0)p1.hit=false;}
  if(p2.ht>0){p2.ht--;if(p2.ht===0)p2.hit=false;}

  // Ball movement
  ball.vy+=GRAV; ball.x+=ball.vx; ball.y+=ball.vy;

  // Walls & ceiling
  if(ball.x-BR<0){ball.x=BR;ball.vx=Math.abs(ball.vx);}
  if(ball.x+BR>W){ball.x=W-BR;ball.vx=-Math.abs(ball.vx);}
  if(ball.y-BR<0){ball.y=BR;ball.vy=Math.abs(ball.vy)*0.7;}

  // Net collision
  if(ball.x+BR>NX-7&&ball.x-BR<NX+7&&ball.y+BR>GND-NH){
    if(ball.vx>0&&ball.x<NX){ball.vx=-Math.abs(ball.vx)*0.7;ball.x=NX-8-BR;}
    else if(ball.vx<0&&ball.x>NX){ball.vx=Math.abs(ball.vx)*0.7;ball.x=NX+8+BR;}
    if(ball.vy>0)ball.vy=-ball.vy*0.4;
  }

  // Ground = point
  if(ball.y+BR>=GND){
    const scorer=ball.x<NX?1:0;
    sc[scorer]++;updHUD();
    if(mode==='online')dbUp(ref(db,'vb/'+rid),{sc});
    if(sc[0]>=WIN||sc[1]>=WIN){endGame();return;}
    ball=mkB(scorer===0?1:0);
    return;
  }

  // Ball-player collisions
  ballHit(p1,1); ballHit(p2,2);

  // Online sync
  if(mode==='online'){
    syncT++;
    if(syncT%3===0){
      const pk=myP===1?'p1':'p2';
      const pp=myP===1?{x:Math.round(p1.x),y:Math.round(p1.y)}:{x:Math.round(p2.x),y:Math.round(p2.y)};
      dbUp(ref(db,'vb/'+rid),{[pk]:pp,ball:{x:+ball.x.toFixed(1),y:+ball.y.toFixed(1),vx:+ball.vx.toFixed(2),vy:+ball.vy.toFixed(2)},bfrom:myP});
    }
  }
}

function physP(p){
  p.vy+=GRAV; p.y+=p.vy;
  if(p.y>=GND-PH){p.y=GND-PH;p.vy=0;p.grnd=true;}
}

function ballHit(p,side){
  if(!ball)return;
  if(ball.x>p.x-BR&&ball.x<p.x+PW+BR&&ball.y>p.y-BR&&ball.y<p.y+PH+BR){
    const cx2=p.x+PW/2,cy2=p.y+PH/2;
    const ang=Math.atan2(ball.y-cy2,ball.x-cx2);
    const spd=p.hit?9:6;
    ball.vx=(side===1?1:-1)*Math.abs(Math.cos(ang)*spd);
    ball.vy=Math.sin(ang)*spd-4;
    if(ball.vy>-2)ball.vy=-2;
    ball.y=p.y-BR-2;
  }
}

function cpuAI(){
  const c=p2;
  const tx=ball.vx>0?ball.x-PW/2:NX-60;
  if(c.x+PW/2<tx-5)c.x=Math.min(W-PW-5,c.x+3.5);
  else if(c.x+PW/2>tx+5)c.x=Math.max(NX+5,c.x-3.5);
  if(ball.vx>0&&ball.x>NX&&ball.y<GND-100&&c.grnd&&Math.abs(c.x+PW/2-ball.x)<90){c.vy=JF*.9;c.grnd=false;}
  if(Math.abs(c.x+PW/2-ball.x)<50&&Math.abs(c.y+PH/2-ball.y)<55&&!c.hit){c.hit=true;c.ht=10;}
}

function endGame(){
  cancelAnimationFrame(raf);raf=null;
  const won=sc[0]>=WIN?p1.name:p2.name;
  document.getElementById('over-txt').innerHTML='🏆 '+won.toUpperCase()+'<br>GANA!';
  sw('s-over');
  document.getElementById('overlay').style.display='flex';
}

function updHUD(){
  document.getElementById('score-left').textContent=(p1?p1.name:'J1')+': '+sc[0];
  document.getElementById('score-right').textContent=sc[1]+' :'+(p2?p2.name:'J2');
}

// ── DRAW ──
function gameDraw(){
  cx.clearRect(0,0,W,H);
  // Sky
  const sg=cx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#1a4a8a');sg.addColorStop(0.65,'#4a9fd4');sg.addColorStop(1,'#7ac0ea');
  cx.fillStyle=sg;cx.fillRect(0,0,W,H);
  // Sun
  cx.fillStyle='#ffe066';cx.shadowColor='#ffe066';cx.shadowBlur=25;
  cx.beginPath();cx.arc(80,65,28,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
  // Clouds
  [[190,55,45],[390,38,38],[570,65,32]].forEach(([x,y,r])=>{
    cx.fillStyle='rgba(255,255,255,0.55)';
    cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(x+r*.65,y+5,r*.65,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(x-r*.55,y+6,r*.6,0,Math.PI*2);cx.fill();
  });
  // Water
  const wg=cx.createLinearGradient(0,GND,0,H);
  wg.addColorStop(0,'#1a6aaa');wg.addColorStop(1,'#0a3a6a');
  cx.fillStyle=wg;cx.fillRect(0,GND,W,H-GND);
  // Sand
  cx.fillStyle='#e0ba6a';cx.fillRect(0,GND-6,W,8);
  // Net
  cx.fillStyle='#b0b0b0';cx.fillRect(NX-5,GND-NH-12,10,NH+14);
  cx.strokeStyle='rgba(255,255,255,0.7)';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(NX-3,GND-NH);cx.lineTo(NX-3,GND);cx.stroke();
  cx.beginPath();cx.moveTo(NX+3,GND-NH);cx.lineTo(NX+3,GND);cx.stroke();
  cx.strokeStyle='rgba(255,255,255,0.2)';cx.lineWidth=1;
  for(let y=GND-NH;y<GND;y+=11){cx.beginPath();cx.moveTo(NX-3,y);cx.lineTo(NX+3,y);cx.stroke();}
  cx.strokeStyle='#fff';cx.lineWidth=3;
  cx.beginPath();cx.moveTo(NX-3,GND-NH);cx.lineTo(NX+3,GND-NH);cx.stroke();
  // Players
  if(p1)drawP(p1,'#ffdd44','#cc8800');
  if(p2)drawP(p2,'#ff7755','#cc3300');
  // Ball
  if(ball){
    cx.fillStyle='rgba(0,0,0,0.15)';
    cx.beginPath();cx.ellipse(ball.x,GND,BR*.7,3,0,0,Math.PI*2);cx.fill();
    const bg=cx.createRadialGradient(ball.x-BR*.3,ball.y-BR*.3,1,ball.x,ball.y,BR);
    bg.addColorStop(0,'#fff');bg.addColorStop(0.5,'#ddeeff');bg.addColorStop(1,'#99bbdd');
    cx.fillStyle=bg;cx.shadowColor='rgba(255,255,255,0.4)';cx.shadowBlur=8;
    cx.beginPath();cx.arc(ball.x,ball.y,BR,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
    cx.strokeStyle='#88aacc';cx.lineWidth=1.5;
    cx.beginPath();cx.arc(ball.x,ball.y,BR,0.4,Math.PI+0.4);cx.stroke();
    cx.beginPath();cx.arc(ball.x,ball.y,BR,-0.4,Math.PI-0.4);cx.stroke();
  }
}

function drawP(p,col,dark){
  const x=p.x,y=p.y;
  cx.fillStyle='rgba(0,0,0,0.18)';
  cx.beginPath();cx.ellipse(x+PW/2,GND,PW*.45,3,0,0,Math.PI*2);cx.fill();
  cx.fillStyle=dark;cx.fillRect(x+5,y+PH-10,8,10);cx.fillRect(x+PW-13,y+PH-10,8,10);
  cx.fillStyle=col;cx.fillRect(x+4,y+14,PW-8,PH-20);
  cx.fillStyle=dark;cx.fillRect(x+4,y+PH-20,PW-8,10);
  cx.fillStyle='#f5c5a3';cx.beginPath();cx.arc(x+PW/2,y+9,9,0,Math.PI*2);cx.fill();
  cx.fillStyle=dark;cx.beginPath();cx.arc(x+PW/2,y+3,8,Math.PI,0);cx.fill();
  cx.strokeStyle='#f5c5a3';cx.lineWidth=3;cx.lineCap='round';
  if(p.hit){const dir=x<NX?1:-1;cx.beginPath();cx.moveTo(x+PW/2,y+18);cx.lineTo(x+PW/2+dir*18,y+8);cx.stroke();}
  else{cx.beginPath();cx.moveTo(x+6,y+18);cx.lineTo(x+3,y+30);cx.stroke();cx.beginPath();cx.moveTo(x+PW-6,y+18);cx.lineTo(x+PW-3,y+30);cx.stroke();}
  cx.font='6px "Press Start 2P"';cx.textAlign='center';cx.textBaseline='middle';
  const nm=p.name.length>8?p.name.slice(0,8):p.name;
  const nw=cx.measureText(nm).width;
  cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(x+PW/2-nw/2-3,y-19,nw+6,13);
  cx.fillStyle='#fff';cx.fillText(nm,x+PW/2,y-13);
}

function hideOv(){document.getElementById('overlay').style.display='none';}
function sw(id){
  ['s-menu','s-wait','s-over'].forEach(s=>document.getElementById(s).style.display='none');
  document.getElementById(id).style.display='block';
}

document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

cx.fillStyle='#0a1628';cx.fillRect(0,0,W,H);
</script>
</body>
</html>
